<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfraDepot Survey</title>

<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>

<body>

<div class="container">

<!-- CONTACT -->
<div class="card">
<div class="section-title">ENTITY & CONTACT</div>

<input id="ownerName" placeholder="Owner Name">

<div class="row">
<input id="ownerPhone" placeholder="Phone">
<input id="ownerWhatsapp" placeholder="WhatsApp">
</div>

<input id="managerName" placeholder="Manager Name">

<div class="row">
<input id="managerPhone" placeholder="Phone">
<input id="managerWhatsapp" placeholder="WhatsApp">
</div>

<input id="address" placeholder="Main Office Address">

</div>

<!-- GPS -->
<div class="card">
<div class="section-title">GPS</div>

<div id="map" class="map"></div>

<button class="btn btn-dark" onclick="captureGPS()">Capture GPS</button>
<input id="coordinates">

</div>

<!-- PHOTO -->
<div class="card">
<div class="section-title">Business Photos</div>

<input type="file" accept="image/*" capture="environment" onchange="handlePhoto(event)">
<div id="photos"></div>

</div>

<!-- MATERIAL -->
<div class="card">
<div class="section-title">Materials Intelligence</div>
<div id="materialsContainer"></div>
</div>

<!-- FLEET -->
<div class="card">
<div class="section-title">Fleet</div>
<div id="fleetContainer"></div>
</div>

<!-- ACTION -->
<div class="card">
<button class="btn" onclick="saveLocal()">SAVE LOCAL</button>
<button class="btn btn-green" onclick="syncCloud()">SYNC CLOUD</button>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="data/materials.js"></script>
<script src="js/materials-engine.js"></script>
<script src="js/core-engine.js"></script>

</body>
</html>

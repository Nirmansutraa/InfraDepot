<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>InfraDepot Capture</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f9;
}

header{
background:#0b1b33;
color:white;
padding:16px;
font-size:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
max-width:600px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

input, select{

width:100%;
padding:12px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #ddd;
font-size:14px;
box-sizing: border-box; /* Prevents input from sliding off screen */

}

button{

padding:12px 20px;
border:none;
background:#0b1b33;
color:white;
border-radius:6px;
cursor:pointer;
width: 100%; /* Better for mobile touch */
font-weight: bold;

}

.logout{

background:#d9534f;
width: auto;
padding: 8px 15px;

}

.status{

margin-top:10px;
font-size:13px;
color:#666;
text-align: center;

}

</style>

</head>

<body>

<header>

<div>InfraDepot – Supplier Capture</div>

<button class="logout" onclick="logout()">Logout</button>

</header>

<div class="container">

<div class="card">

<h3>Supplier Information</h3>

<input id="firm" placeholder="Firm Name (Required)">

<input id="owner" placeholder="Owner Name (Required)">

<input id="phone" placeholder="Phone Number" type="tel">

<input id="whatsapp" placeholder="WhatsApp Number" type="tel">

<input id="address" placeholder="Business Address">

<select id="material">

<option value="">Material Category</option>
<option>Sand</option>
<option>Aggregates</option>
<option>Cement</option>
<option>Steel</option>

</select>

<button onclick="saveSupplier()">Save Supplier to HQ</button>

<div class="status" id="status">Ready for Capture</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
// Firebase Configuration
const firebaseConfig = {
    apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
    authDomain: "infradepo.firebaseapp.com",
    projectId: "infradepo",
    storageBucket: "infradepo.firebasestorage.app",
    messagingSenderId: "733942710671",
    appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// 🛡️ SECURITY GUARD: Check if user is logged in
auth.onAuthStateChanged((user) => {
    if (!user) {
        // If not logged in, go to index.html (NOT login.html)
        window.location.href = "index.html";
    }
});

function logout(){
    auth.signOut().then(() => {
        window.location.href = "index.html";
    });
}

async function saveSupplier(){
    const firm = document.getElementById("firm").value;
    const owner = document.getElementById("owner").value;
    const phone = document.getElementById("phone").value;
    const whatsapp = document.getElementById("whatsapp").value;
    const address = document.getElementById("address").value;
    const material = document.getElementById("material").value;
    const statusDiv = document.getElementById("status");

    if(firm == "" || owner == ""){
        statusDiv.innerText = "Error: Firm and Owner name are required.";
        statusDiv.style.color = "red";
        return;
    }

    statusDiv.innerText = "Saving to HQ Database...";
    statusDiv.style.color = "orange";

    try {
        // Saving to the 'field_data' collection in Firebase
        await db.collection("field_data").add({
            firmName: firm,
            ownerName: owner,
            phone: phone,
            whatsapp: whatsapp,
            address: address,
            material: material,
            status: "pending",
            capturedBy: auth.currentUser.email,
            userId: auth.currentUser.uid,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });

        statusDiv.innerText = "Success! Supplier details synced to HQ.";
        statusDiv.style.color = "green";

        // Clear the form for the next entry
        document.getElementById("firm").value = "";
        document.getElementById("owner").value = "";
        document.getElementById("phone").value = "";
        document.getElementById("whatsapp").value = "";
        document.getElementById("address").value = "";
        document.getElementById("material").value = "";

    } catch (error) {
        console.error("Error saving data:", error);
        statusDiv.innerText = "Error: Could not save to database.";
        statusDiv.style.color = "red";
    }
}
</script>

</body>
</html>

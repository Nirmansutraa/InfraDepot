<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Terminal | Survey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        body { font-family: sans-serif; background:#f4f6f9; }
        .card { background:#fff; padding:20px; margin-bottom:15px; border-radius:15px; border: 1px solid #eee; }
        .section-label { font-size:10px; font-weight: 800; color:#FF5A00; margin-bottom:10px; text-transform: uppercase; letter-spacing: 1px; }
        input, select, textarea { width:100%; padding:12px; margin:6px 0; border-radius:10px; border:1px solid #ddd; outline:none; }
        input:focus { border-color: #FF5A00; }
        .map-box { height:150px; border-radius:12px; margin-bottom:10px; border: 1px solid #ddd; }
        .btn-orange { background:#FF5A00; color:white; width:100%; padding:15px; border-radius:12px; font-weight:bold; text-transform: uppercase; }
        #auth-guard { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body class="pb-10 px-4 pt-4">

    <div id="auth-guard">
        <div class="w-10 h-10 border-4 border-gray-100 border-t-[#FF5A00] rounded-full animate-spin"></div>
    </div>

    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-6">
            <h1 class="font-black italic text-slate-800 tracking-tighter uppercase">Nirmansutra <span class="text-[#FF5A00]">Field</span></h1>
            <button onclick="logout()" class="text-[10px] font-bold text-red-500 border border-red-100 px-3 py-1 rounded">Logout</button>
        </header>

        <div class="card">
            <div class="section-label">1. Contact Registry</div>
            <input id="firm" placeholder="Firm / Shop Name (Required)">
            <input id="owner" placeholder="Owner Name">
            <div class="flex gap-2">
                <input id="phone" placeholder="Phone" oninput="document.getElementById('wa').value=this.value">
                <input id="wa" placeholder="WhatsApp">
            </div>
            <textarea id="address" placeholder="Detected Address" rows="2"></textarea>
        </div>

        <div class="card">
            <div class="section-label">2. Geotagging</div>
            <div id="map" class="map-box"></div>
            <button onclick="getGPS()" class="w-full bg-slate-800 text-white text-[10px] py-3 rounded-lg font-bold uppercase mb-2">📍 Refresh Location</button>
            <input id="coords" readonly placeholder="GPS Coordinates" class="bg-gray-50 text-gray-400 text-xs">
        </div>

        <div class="card">
            <div class="section-label">3. Material Focus</div>
            <select id="material">
                <option>Cement</option>
                <option>TMT Steel</option>
                <option>River Sand</option>
                <option>Aggregates</option>
                <option>Bricks</option>
            </select>
        </div>

        <button id="sync-btn" onclick="submit()" class="btn-orange shadow-lg shadow-orange-500/20 active:scale-95 transition-all">🚀 Submit to HQ</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
            authDomain: "infradepo.firebaseapp.com",
            projectId: "infradepo",
            storageBucket: "infradepo.firebasestorage.app",
            messagingSenderId: "733942710671",
            appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        auth.onAuthStateChanged(user => {
            if(!user) window.location.href="index.html";
            else { document.getElementById('auth-guard').style.display = 'none'; getGPS(); }
        });

        let map = L.map('map').setView([24.5854, 73.7125], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker, userLat, userLng;

        function getGPS() {
            navigator.geolocation.getCurrentPosition(async pos => {
                userLat = pos.coords.latitude; userLng = pos.coords.longitude;
                document.getElementById('coords').value = userLat + ", " + userLng;
                if(marker) map.removeLayer(marker);
                marker = L.marker([userLat, userLng]).addTo(map);
                map.setView([userLat, userLng], 16);
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${userLat}&lon=${userLng}&format=json`);
                const data = await res.json();
                document.getElementById('address').value = data.display_name;
            });
        }

        async function submit() {
            const firm = document.getElementById('firm').value;
            if(!firm) return alert("Firm Name Required");
            const btn = document.getElementById('sync-btn');
            btn.innerText = "⌛ SYNCING..."; btn.disabled = true;

            try {
                await db.collection("field_data").add({
                    firmName: firm, ownerName: document.getElementById('owner').value,
                    phone: document.getElementById('phone').value,
                    material: document.getElementById('material').value,
                    latitude: userLat, longitude: userLng,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    capturedBy: auth.currentUser.email
                });
                alert("✅ Synced Successfully!"); location.reload();
            } catch(e) { alert("Error: " + e.message); btn.innerText = "🚀 Submit to HQ"; btn.disabled = false; }
        }

        function logout() { auth.signOut().then(() => window.location.href="index.html"); }
    </script>
</body>
</html>

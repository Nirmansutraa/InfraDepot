<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NirmaSutra Intelligence Network | NSIDBS06</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* NIRMASUTRA DESIGN SYSTEM (NDS) v6.0
           Color Palette: 
           - Primary: #ff6a00 (Construction Orange)
           - Secondary: #0f172a (Deep Space Blue)
           - Action: #10b981 (Eco Green)
        */
        
        :root { 
            --orange: #ff6a00; 
            --orange-soft: rgba(255, 106, 0, 0.1);
            --bg: #f8fafc; 
            --green: #10b981; 
            --dark: #0f172a; 
            --slate: #64748b; 
            --red: #ef4444; 
            --blue: #3b82f6; 
            --white: #ffffff; 
            --border: #e2e8f0;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0; 
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: #1e293b; 
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* --- LAYER 0: SECURITY UI --- */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--dark);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(25px);
            padding: 50px 35px;
            border-radius: 45px;
            text-align: center;
            color: white;
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.6);
        }

        .system-title {
            font-size: 32px;
            font-weight: 900;
            color: var(--orange);
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .system-subtitle {
            font-size: 11px;
            letter-spacing: 5px;
            color: var(--slate);
            text-transform: uppercase;
            margin-bottom: 45px;
            font-weight: 700;
        }

        /* Input Styling with Show/Hide Logic */
        .field-group {
            position: relative;
            width: 100%;
            margin-bottom: 22px;
        }

        .auth-input {
            width: 100%;
            padding: 22px;
            padding-right: 60px;
            border-radius: 20px;
            border: 2px solid #334155;
            background: #020617;
            color: white;
            font-size: 16px;
            text-align: left;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .auth-input:focus {
            border-color: var(--orange);
            outline: none;
            box-shadow: 0 0 0 4px rgba(255, 106, 0, 0.15);
        }

        .visibility-toggle {
            position: absolute;
            right: 22px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--slate);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            width: 100%;
            padding: 22px;
            border: none;
            border-radius: 22px;
            background: var(--orange);
            color: white;
            font-weight: 800;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        /* --- LAYER 1: APP ROOT --- */
        #main_application {
            display: none;
            max-width: 680px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 140px;
        }

        /* Navigation Header */
        .app-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background: var(--orange);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
        }

        /* HUD Stats */
        .hud-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: var(--white);
            padding: 20px;
            border-radius: 25px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .stat-value {
            display: block;
            font-size: 24px;
            font-weight: 900;
            color: var(--dark);
        }

        .stat-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--slate);
            font-weight: 700;
        }

        /* Section Styling */
        .module-header {
            margin: 40px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .module-number {
            width: 35px;
            height: 35px;
            background: var(--dark);
            color: var(--orange);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            font-weight: 900;
        }

        .module-title {
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .content-card {
            background: var(--white);
            padding: 30px;
            border-radius: 30px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        /* Map & Photos */
        #map_display {
            height: 300px;
            width: 100%;
            border-radius: 25px;
            border: 4px solid var(--white);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            z-index: 1;
        }

        .photo-gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .photo-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 20px;
            overflow: hidden;
            background: #e2e8f0;
            border: 2px solid var(--white);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .geo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.85);
            color: var(--green);
            padding: 10px;
            font-size: 9px;
            font-family: monospace;
        }

        .hidden { display: none !important; }

        /* Floating Actions */
        .action-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            background: var(--dark);
            padding: 15px;
            border-radius: 30px;
            display: flex;
            gap: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        .btn-sync {
            flex: 1;
            padding: 18px;
            border-radius: 20px;
            border: none;
            font-weight: 800;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="gate_master" class="auth-screen">
        <div class="auth-card">
            <h1 class="system-title">NIRMASUTRA</h1>
            <p class="system-subtitle">MASTER SECURITY GATE</p>
            
            <div class="field-group">
                <input type="password" id="m_pass_input" class="auth-input" placeholder="SYSTEM MASTER KEY">
                <button class="visibility-toggle" onclick="toggleInputVisibility('m_pass_input')">👁️</button>
            </div>

            <button class="btn-primary" onclick="verifyMasterGate()">AUTHORIZE SYSTEM</button>
            <p id="m_error" style="color:var(--red); font-size:12px; margin-top:20px; font-weight:800;"></p>
        </div>
    </div>

    <div id="gate_user" class="auth-screen hidden">
        <div class="auth-card">
            <h1 class="system-title">OPERATOR</h1>
            <p class="system-subtitle">IDENTITY VERIFICATION</p>
            
            <div class="field-group">
                <input type="text" id="u_id_input" class="auth-input" placeholder="USER ID (NSID001)">
            </div>

            <div class="field-group">
                <input type="password" id="u_pass_input" class="auth-input" placeholder="PASSWORD">
                <button class="visibility-toggle" onclick="toggleInputVisibility('u_pass_input')">👁️</button>
            </div>

            <button id="login_btn" class="btn-primary" onclick="processUserAuthentication()" style="background:var(--blue);">VERIFY IDENTITY</button>
            
            <div style="margin-top:25px;">
                <a href="javascript:void(0)" onclick="invokeAdminHelp()" style="color:var(--slate); font-size:11px; text-decoration:none; font-weight:700;">REQUEST ACCESS RESET</a>
            </div>
            <p id="u_error" style="color:var(--red); font-size:12px; margin-top:20px; font-weight:800;"></p>
        </div>
    </div>

    <div id="main_application">
        
        <header class="app-nav">
            <div class="user-profile">
                <div class="user-avatar" id="avatar_initial">A</div>
                <div>
                    <p style="font-size:10px; font-weight:800; color:var(--slate); text-transform:uppercase;">Active Operator</p>
                    <p style="font-size:14px; font-weight:900;" id="display_uid">NSID000</p>
                </div>
            </div>
            <button onclick="systemTermination()" style="background:var(--red); border:none; color:white; padding:10px 20px; border-radius:15px; font-size:10px; font-weight:900;">TERMINATE</button>
        </header>

        <div class="hud-container">
            <div class="stat-box">
                <span class="stat-label">Offline</span>
                <span class="stat-value" id="count_local">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Photos</span>
                <span class="stat-value" id="count_photos">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">GPS Stat</span>
                <span class="stat-value" id="gps_indicator" style="color:var(--red); font-size:14px;">NO-LOCK</span>
            </div>
        </div>

        <div class="module-header">
            <div class="module-number">01</div>
            <div class="module-title">Business Intelligence</div>
        </div>
        
        <div class="content-card">
            <div id="firm_id_badge" style="background:var(--dark); color:var(--green); text-align:center; padding:25px; border-radius:20px; font-family:monospace; font-size:28px; margin-bottom:25px; border:2px solid #334155;">NS-NEW-0000</div>
            
            <div style="margin-bottom:20px;">
                <label style="font-size:10px; font-weight:900; color:var(--slate); text-transform:uppercase; display:block; margin-bottom:8px;">Legal Firm Name</label>
                <input type="text" id="input_firm_name" style="width:100%; padding:18px; border-radius:15px; border:1px solid var(--border); background:var(--bg); font-size:16px;" placeholder="Enter Firm Name" oninput="generateDynamicID()">
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <div>
                    <label style="font-size:10px; font-weight:900; color:var(--slate); text-transform:uppercase; display:block; margin-bottom:8px;">Proprietor</label>
                    <input type="text" id="input_owner" style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); background:var(--bg);" placeholder="Name">
                </div>
                <div>
                    <label style="font-size:10px; font-weight:900; color:var(--slate); text-transform:uppercase; display:block; margin-bottom:8px;">Contact No</label>
                    <input type="tel" id="input_phone" style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); background:var(--bg);" placeholder="10 Digits">
                </div>
            </div>
        </div>

        <div class="module-header">
            <div class="module-number">02</div>
            <div class="module-title">Spatial Positioning</div>
        </div>

        <div class="content-card">
            <div id="map_display"></div>
            <button class="btn-primary" style="background:var(--dark); margin-bottom:20px;" onclick="triggerPrecisionGPS()">📍 LOCK PRECISION GPS</button>
            
            <input type="hidden" id="internal_coords">
            
            <label style="font-size:10px; font-weight:900; color:var(--slate); text-transform:uppercase; display:block; margin-bottom:8px;">Site Address (Auto-Verified)</label>
            <textarea id="output_address" rows="3" style="width:100%; padding:18px; border-radius:15px; border:1px solid var(--border); background:var(--bg); font-size:14px;" placeholder="Locked coordinates will generate address..."></textarea>
        </div>

        <div class="module-header">
            <div class="module-number">03</div>
            <div class="module-title">Visual Documentation</div>
        </div>

        <div class="content-card">
            <div class="photo-gallery" id="photo_preview_container">
                </div>
            
            <input type="file" id="camera_trigger" accept="image/*" capture="environment" style="display:none;" onchange="handleImageCapture(this)">
            <button class="btn-primary" onclick="document.getElementById('camera_trigger').click()" style="background:var(--blue); margin-top:20px;">📷 CAPTURE GEO-TAGGED IMAGE</button>
        </div>

        <div class="action-bar">
            <button class="btn-sync" style="background:var(--blue); color:white;" onclick="commitRecordToLocal()">💾 LOCAL SAVE</button>
            <button class="btn-sync" style="background:var(--green); color:white;" onclick="initiateCloudPush()">🚀 CLOUD SYNC</button>
        </div>

    </div>

    <script>
        /**
         * GLOBAL CONFIGURATIONS
         * Location: Udaipur, Rajasthan (Central Hub)
         */
        const MASTER_SYSTEM_KEY = "Life4life@nsdb";
        const UDAIPUR_GPS = { lat: 24.5854, lng: 73.7125 };
        const AUTHORIZED_RADIUS_KM = 1.5; // Roughly 150km safety radius

        let leafMap, leafMarker, capturedAssets = [], localDatabase;
        let currentUser = null;

        // --- 01. INITIALIZATION SEQUENCE ---
        window.addEventListener('load', function() {
            console.log("NSIDBS06: System Boot Initiated");
            setupIndexedDB();
            checkExistingSession();
        });

        function setupIndexedDB() {
            const dbRequest = indexedDB.open("NSIDBS_MASTER_PROD", 8);
            
            dbRequest.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains("site_records")) {
                    db.createObjectStore("site_records", { keyPath: "id", autoIncrement: true });
                }
                console.log("NSIDBS06: Database Schema Updated");
            };

            dbRequest.onsuccess = (event) => {
                localDatabase = event.target.result;
                refreshDashboardMetrics();
            };

            dbRequest.onerror = () => {
                alert("CRITICAL ERROR: Browser Database Access Denied.");
            };
        }

        // --- 02. SECURITY LOGIC (VISIBILITY & GATES) ---
        
        function toggleInputVisibility(elementId) {
            const inputField = document.getElementById(elementId);
            if (inputField.type === "password") {
                inputField.type = "text";
            } else {
                inputField.type = "password";
            }
        }

        function verifyMasterGate() {
            const rawVal = document.getElementById('m_pass_input').value;
            const input = rawVal.trim(); // Handle accidental spaces
            const errorLabel = document.getElementById('m_error');

            if (input === MASTER_SYSTEM_KEY) {
                sessionStorage.setItem('ns_master_clearance', 'AUTHORIZED');
                document.getElementById('gate_master').classList.add('hidden');
                document.getElementById('gate_user').classList.remove('hidden');
            } else {
                errorLabel.innerText = "ACCESS DENIED: INVALID SYSTEM KEY";
                document.getElementById('m_pass_input').style.borderColor = "var(--red)";
                setTimeout(() => {
                    errorLabel.innerText = "";
                    document.getElementById('m_pass_input').style.borderColor = "#334155";
                }, 3000);
            }
        }

        async function processUserAuthentication() {
            const uid = document.getElementById('u_id_input').value.trim();
            const pass = document.getElementById('u_pass_input').value.trim();
            const btn = document.getElementById('login_btn');
            const error = document.getElementById('u_error');

            if (!uid || !pass) {
                error.innerText = "Credentials required.";
                return;
            }

            btn.innerText = "VERIFYING RADIUS...";
            btn.disabled = true;

            // SECURITY LAYER 5: GPS RADIUS CHECK
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;

                    // Radius Calculation (Pythagorean estimate for localized radius)
                    const diffLat = lat - UDAIPUR_GPS.lat;
                    const diffLng = lng - UDAIPUR_GPS.lng;
                    const distance = Math.sqrt(Math.pow(diffLat, 2) + Math.pow(diffLng, 2));

                    if (distance > AUTHORIZED_RADIUS_KM) {
                        alert("SECURITY LOCK: Outside operational radius (Rajasthan). Access restricted.");
                        btn.innerText = "VERIFY IDENTITY";
                        btn.disabled = false;
                        return;
                    }

                    // LAYER 2: Credential Check
                    const validUsers = {
                        "NSID001": "Life4life@01",
                        "NSID002": "Life4life@02",
                        "NSID003": "Life4life@03",
                        "NSID004": "Life4life@04",
                        "NSID005": "Life4life@05"
                    };

                    if (validUsers[uid] === pass) {
                        launchApplicationSession(uid);
                    } else {
                        error.innerText = "INVALID USER ID OR PASSWORD";
                        btn.innerText = "VERIFY IDENTITY";
                        btn.disabled = false;
                    }
                },
                (err) => {
                    alert("SECURITY REQUIREMENT: GPS hardware must be active for login.");
                    btn.innerText = "VERIFY IDENTITY";
                    btn.disabled = false;
                },
                { enableHighAccuracy: true }
            );
        }

        function launchApplicationSession(uid) {
            currentUser = uid;
            sessionStorage.setItem('ns_user_active', uid);
            
            document.getElementById('gate_user').classList.add('hidden');
            document.getElementById('main_application').style.display = 'block';
            
            document.getElementById('display_uid').innerText = uid;
            document.getElementById('avatar_initial').innerText = uid.charAt(4);
            
            initializeMapModule();
        }

        function checkExistingSession() {
            const master = sessionStorage.getItem('ns_master_clearance');
            const user = sessionStorage.getItem('ns_user_active');
            
            if (master === 'AUTHORIZED' && user) {
                document.getElementById('gate_master').classList.add('hidden');
                launchApplicationSession(user);
            } else if (master === 'AUTHORIZED') {
                document.getElementById('gate_master').classList.add('hidden');
                document.getElementById('gate_user').classList.remove('hidden');
            }
        }

        // --- 03. CORE MAP LOGIC ---

        function initializeMapModule() {
            setTimeout(() => {
                if (leafMap) return;
                
                leafMap = L.map('map_display').setView([24.5854, 73.7125], 13);
                
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '© OpenStreetMap'
                }).addTo(leafMap);

                leafMap.on('click', (e) => {
                    updateMarkerPosition(e.latlng.lat, e.latlng.lng);
                });
            }, 600);
        }

        async function triggerPrecisionGPS() {
            if (!navigator.geolocation) return alert("Browser does not support GPS.");

            navigator.geolocation.getCurrentPosition((p) => {
                const lat = p.coords.latitude;
                const lng = p.coords.longitude;
                updateMarkerPosition(lat, lng);
            }, (err) => {
                alert("GPS Error: Ensure high-accuracy mode is on.");
            }, { enableHighAccuracy: true });
        }

        function updateMarkerPosition(lat, lng) {
            const coords = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
            document.getElementById('internal_coords').value = coords;
            document.getElementById('gps_indicator').innerText = "SECURED";
            document.getElementById('gps_indicator').style.color = "var(--green)";

            if (leafMarker) leafMap.removeLayer(leafMarker);
            leafMarker = L.marker([lat, lng], { draggable: true }).addTo(leafMap);
            leafMap.setView([lat, lng], 16);

            fetchReverseGeocode(lat, lng);
        }

        async function fetchReverseGeocode(lat, lng) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                const data = await response.json();
                if (data.display_name) {
                    document.getElementById('output_address').value = data.display_name;
                }
            } catch (e) {
                console.warn("Reverse Geocoding failed or offline.");
            }
        }

        // --- 04. MEDIA HANDLING ---

        function handleImageCapture(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Optimization: Resize to 1200px max width
                    const scale = 1200 / img.width;
                    canvas.width = 1200;
                    canvas.height = img.height * scale;
                    
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const asset = {
                        id: Date.now(),
                        data: canvas.toDataURL('image/jpeg', 0.8),
                        gps: document.getElementById('internal_coords').value || "NO_GPS",
                        time: new Date().toLocaleTimeString()
                    };

                    capturedAssets.push(asset);
                    renderPhotoGrid();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function renderPhotoGrid() {
            const container = document.getElementById('photo_preview_container');
            container.innerHTML = capturedAssets.map(asset => `
                <div class="photo-item">
                    <img src="${asset.data}">
                    <div class="geo-overlay">
                        📍 ${asset.gps}<br>🕒 ${asset.time}
                        <button onclick="removeAsset(${asset.id})" style="float:right; background:var(--red); border:none; color:white; border-radius:50%; width:15px; height:15px; cursor:pointer;">×</button>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('count_photos').innerText = capturedAssets.length;
        }

        function removeAsset(id) {
            capturedAssets = capturedAssets.filter(a => a.id !== id);
            renderPhotoGrid();
        }

        // --- 05. DATA STORAGE & SYNC ---

        function generateDynamicID() {
            const name = document.getElementById('input_firm_name').value;
            const prefix = name.length >= 3 ? name.substring(0,3).toUpperCase() : "NEW";
            const randomSuffix = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('firm_id_badge').innerText = `NS-${prefix}-${randomSuffix}`;
        }

        function commitRecordToLocal() {
            const firmName = document.getElementById('input_firm_name').value;
            const gps = document.getElementById('internal_coords').value;

            if (!firmName || !gps) {
                alert("CRITICAL ERROR: Firm Name and GPS Lock are required for commitment.");
                return;
            }

            const payload = {
                uid: document.getElementById('firm_id_badge').innerText,
                firm: firmName,
                owner: document.getElementById('input_owner').value,
                phone: document.getElementById('input_phone').value,
                gps: gps,
                address: document.getElementById('output_address').value,
                media: capturedAssets,
                operator: currentUser,
                timestamp: new Date().toISOString()
            };

            const tx = localDatabase.transaction("site_records", "readwrite");
            const store = tx.objectStore("site_records");
            
            store.add(payload);

            tx.oncomplete = () => {
                alert("COMMIT SUCCESS: Record secured in Local encrypted storage.");
                location.reload();
            };
        }

        function refreshDashboardMetrics() {
            if (!localDatabase) return;
            const tx = localDatabase.transaction("site_records", "readonly");
            const store = tx.objectStore("site_records");
            const countReq = store.count();
            
            countReq.onsuccess = () => {
                document.getElementById('count_local').innerText = countReq.result;
            };
        }

        function initiateCloudPush() {
            alert("Establishing SSL Tunnel to NirmaSutra Mainframe... [Sync logic ready for API URL]");
        }

        function systemTermination() {
            if (confirm("TERMINATE SESSION: This will clear temporary clearance. Proceed?")) {
                sessionStorage.clear();
                location.reload();
            }
        }

        function invokeAdminHelp() {
            const user = document.getElementById('u_id_input').value || "UNKNOWN";
            window.open(`https://wa.me/91XXXXXXXXXX?text=URGENT_ACCESS_REQUEST_FOR_${user}`);
        }

    </script>
</body>
</html>

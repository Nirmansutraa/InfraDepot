<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfraDepot | Field Capture</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen p-6">

    <header class="mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-emerald-400 uppercase">InfraDepot</h1>
            <p class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Field Intelligence Unit</p>
        </div>
        <button onclick="location.reload()" class="bg-slate-800 p-2 rounded-lg text-xs">🔄 Refresh</button>
    </header>

    <div class="max-w-md mx-auto space-y-6">
        <section class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-xl">
            <label class="text-[10px] font-bold uppercase text-slate-400 block mb-2">Shop/Firm Name</label>
            <input type="text" id="firm-name" placeholder="Enter Shop Name" class="w-full bg-slate-950 border border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 text-white">
        </section>

        <section class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-xl">
            <label class="text-[10px] font-bold uppercase text-slate-400 block mb-2">Primary Material</label>
            <select id="material-type" class="w-full bg-slate-950 border border-slate-700 p-4 rounded-2xl outline-none mb-4 text-white">
                <option value="Cement">Cement</option>
                <option value="Steel">Steel (Saria)</option>
                <option value="Bricks">Bricks/AAC Blocks</option>
            </select>
            
            <label class="text-[10px] font-bold uppercase text-slate-400 block mb-2">Brand</label>
            <input type="text" id="brand-name" placeholder="e.g. UltraTech, Wonder" class="w-full bg-slate-950 border border-slate-700 p-4 rounded-2xl outline-none text-white">
        </section>

        <section id="gps-card" class="bg-slate-800 p-6 rounded-3xl border border-rose-900/50 shadow-xl flex items-center justify-between transition-all">
            <div>
                <h3 class="font-bold text-sm">GPS Precision Lock</h3>
                <p id="gps-status" class="text-[10px] text-rose-400 uppercase font-black italic">Searching for satellites...</p>
            </div>
            <div id="gps-indicator" class="w-4 h-4 rounded-full bg-rose-500 animate-pulse"></div>
        </section>

        <button id="submit-survey" disabled class="w-full bg-slate-700 text-slate-400 font-black p-5 rounded-3xl text-lg transition-all cursor-not-allowed">
            WAITING FOR GPS...
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
            authDomain: "infradepo.firebaseapp.com",
            projectId: "infradepo",
            storageBucket: "infradepo.firebasestorage.app",
            messagingSenderId: "733942710671",
            appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let coords = null;
        let currentUser = null;

        // Security: Ensure only authorized staff can see this
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html";
            } else {
                currentUser = user;
            }
        });

        // High-Accuracy GPS Logic
        navigator.geolocation.watchPosition((pos) => {
            coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            const btn = document.getElementById('submit-survey');
            const card = document.getElementById('gps-card');
            
            document.getElementById('gps-status').innerText = "LOCATION LOCKED (" + pos.coords.accuracy.toFixed(1) + "m)";
            document.getElementById('gps-status').classList.replace('text-rose-400', 'text-emerald-400');
            document.getElementById('gps-indicator').classList.replace('bg-rose-500', 'bg-emerald-500');
            card.classList.replace('border-rose-900/50', 'border-emerald-900/50');
            
            btn.disabled = false;
            btn.innerText = "UPLOAD INTELLIGENCE";
            btn.classList.replace('bg-slate-700', 'bg-emerald-500');
            btn.classList.replace('text-slate-400', 'text-slate-900');
        }, (err) => {
            alert("GPS Error: Please turn on Location/High Accuracy.");
        }, { enableHighAccuracy: true });

        document.getElementById('submit-survey').onclick = async () => {
            const firm = document.getElementById('firm-name').value.trim();
            const brand = document.getElementById('brand-name').value.trim();
            
            if(!firm || !brand) return alert("All fields are mandatory for Market Intelligence.");

            try {
                document.getElementById('submit-survey').innerText = "SYNCING...";
                await addDoc(collection(db, "surveys"), {
                    firmName: firm,
                    material: document.getElementById('material-type').value,
                    brand: brand,
                    location: coords,
                    capturedBy: currentUser.uid,
                    timestamp: serverTimestamp()
                });
                alert("SUCCESS: Data uploaded to Udaipur HQ.");
                location.reload();
            } catch (e) {
                alert("Upload Failed: " + e.message);
            }
        };
    </script>
</body>
</html>

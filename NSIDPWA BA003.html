<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InfraDepot Intel V013</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --orange: #ff6a00; --bg: #f0f4f8; --green: #10b981; --dark: #0f172a; --slate: #64748b; --red: #ef4444; --blue: #3b82f6; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #1e293b; }
        .container { max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 15px; padding-bottom: 80px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; position: relative; }
        h3 { margin: 0 0 12px 0; color: var(--dark); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; border-left: 4px solid var(--orange); padding-left: 8px; }
        .id-box { background: #0f172a; color: #22c55e; font-family: monospace; font-size: 22px; text-align: center; padding: 15px; border-radius: 8px; font-weight: bold; margin-bottom: 10px; border: 1px solid #334155; }
        .cat-box { background: #0f172a; color: white; padding: 16px; border-radius: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; margin-bottom: 8px; }
        .cat-box input { width: 22px; height: 22px; accent-color: var(--orange); }
        .nested-panel { display: none; margin-top: 8px; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .v-panel { background: #fff7ed; border-left: 4px solid var(--orange); }
        .b-panel { background: #eff6ff; border-left: 4px solid var(--blue); margin-top: 8px; }
        .pill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .t-pill { display: flex; align-items: center; background: white; border: 1px solid #cbd5e1; padding: 10px; border-radius: 8px; font-size: 11px; font-weight: 600; }
        .t-pill input { margin-right: 8px; width: 16px; height: 16px; accent-color: var(--orange); }
        .full-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .counter-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .stepper { display: flex; align-items: center; gap: 8px; }
        .stepper button { border: none; background: var(--dark); color: white; width: 28px; height: 28px; border-radius: 4px; font-weight: bold; }
        .stepper input { width: 30px !important; text-align: center; border: none !important; margin: 0 !important; background: transparent; font-weight: bold; padding: 0; }
        #preview_zone { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .thumb-wrapper { position: relative; width: 100%; aspect-ratio: 1/1; }
        .thumb { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
        label { font-size: 10px; font-weight: 700; color: var(--slate); display: block; margin-bottom: 4px; margin-top: 10px; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .btn-action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn { padding: 15px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .history-card { margin-top: 5px; padding: 10px; border-bottom: 1px solid #e2e8f0; font-size: 12px; background: white; border-radius: 8px; }
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.9); z-index: 10000; color: white; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
<div id="loader"><div id="status_msg">Fetching Geo-Data...</div></div>
<div class="container" id="main_app_content">
    
    <div class="card">
        <h3>1. Tracking ID</h3>
        <div id="sup_id" class="id-box">ID---</div>
    </div>

    <div class="card">
        <h3>2. Entity & Contact Information</h3>
        <label>Firm Name</label>
        <input type="text" id="firm_name" oninput="updateID()" placeholder="Enter Firm Name">
        
        <div style="border-top: 1px solid #eee; margin-top: 15px; padding-top: 10px;">
            <label style="color:var(--orange)">OWNER DETAILS</label>
            <input type="text" id="owner_name" placeholder="Owner Full Name">
            <div class="full-grid">
                <div><label>Owner Phone</label><input type="tel" id="owner_phone" oninput="mirror('owner_phone', 'owner_whatsapp')"></div>
                <div><label>Owner WhatsApp</label><input type="tel" id="owner_whatsapp"></div>
            </div>
        </div>

        <div style="border-top: 1px solid #eee; margin-top: 15px; padding-top: 10px;">
            <label style="color:var(--blue)">MANAGER CONTACT</label>
            <input type="text" id="manager_name" placeholder="Manager Name">
            <div class="full-grid">
                <div><label>Manager Phone</label><input type="tel" id="manager_phone" oninput="mirror('manager_phone', 'manager_whatsapp')"></div>
                <div><label>Manager WhatsApp</label><input type="tel" id="manager_whatsapp"></div>
            </div>
        </div>
        
        <label>Business Address</label>
        <textarea id="business_address" placeholder="Waiting for GPS trigger..." style="height:70px;"></textarea>
    </div>

    <div class="card">
        <h3>3. GPS & Verification</h3>
        <div id="map" style="height:200px; border-radius:10px; margin-bottom:10px; z-index:1;"></div>
        <button class="btn" style="background:var(--dark); color:white; width:100%;" onclick="getGPS()">📍 CAPTURE GPS & AUTO-ADDRESS</button>
        <input type="text" id="gps_val" readonly style="margin-top:10px; background:#f1f5f9;" placeholder="Coordinates">
        
        <label>Verification Photos</label>
        <input type="file" id="img_in" accept="image/*" capture="environment" multiple hidden onchange="handlePhotos(this)">
        <div style="border:2px dashed var(--slate); padding:15px; text-align:center; border-radius:10px; color:var(--slate); font-size:11px; cursor:pointer;" onclick="document.getElementById('img_in').click()">
            📸 Tap to capture Business Verification photos
        </div>
        <div id="preview_zone"></div>
    </div>

    <div class="card">
        <h3>4. Materials Intelligence</h3>
        <div id="material_hierarchy_root"></div>
    </div>

    <div class="card">
        <h3>5. Transportation Fleet</h3>
        <div class="full-grid" id="fleet_ui"></div>
    </div>

    <div class="card">
        <h3>6. Data Actions</h3>
        <div class="btn-action-grid">
            <button class="btn" style="background:var(--slate); color:white;" onclick="saveLocal()">💾 SAVE (Local)</button>
            <button class="btn" style="background:var(--green); color:white;" onclick="submitData()">📤 SUBMIT</button>
            <button class="btn" style="background:var(--blue); color:white;" onclick="syncCloud()">🔄 SYNC</button>
            <button class="btn" style="background:var(--orange); color:white;" onclick="location.reload()">➕ NEXT ENTRY</button>
        </div>
    </div>

    <div class="card">
        <h3>7. History</h3>
        <div id="history_list"></div>
    </div>
</div>

<script>
const intelData = {
    "Sand": { v: ["River Sand", "M-Sand", "P-Sand", "Crushed Sand"], b: ["Local Premium", "Reliable", "Eco-Sand"] },
    "Stone": { v: ["Random Rubble", "Squared Rubble", "Ashlar", "Laterite"], b: ["Local Quarry", "Premium Basalt"] },
    "Cement": { 
        v: ["OPC 43", "OPC 53", "PPC", "White Cement"], 
        b: ["UltraTech", "Ambuja", "ACC", "Shree Cement", "Dalmia Bharat", "JK Lakshmi", "Birla White", "Jindal", "Ramco", "Wonder Cement"] 
    },
    "TMT Steel": { 
        v: ["Fe 500", "Fe 500D", "Fe 550", "Fe 600"], 
        b: ["Tata Tiscon", "JSW Neosteel", "Sail TMT", "Vizag Steel", "Jindal Panther", "Kamdhenu", "Essar", "Rathi", "Shyam Steel", "Amba Shakti"] 
    },
    "Aggregates": { v: ["10mm", "20mm", "40mm", "Stone Dust"], b: ["L&T Crusher", "Mega-Grit", "Alpha"] }
};

const fleetList = ["Tractor", "Mini Truck", "Truck", "Mini Dumper", "Dumper", "Trailer"];
let map, marker, activePhotos = [];

function init() {
    const root = document.getElementById('material_hierarchy_root');
    Object.keys(intelData).forEach(cat => {
        const id = cat.replace(/[^\w]/g, '');
        const div = document.createElement('div');
        div.innerHTML = `
            <div class="cat-box" onclick="handleHeaderClick(event, '${id}')">
                <input type="checkbox" id="main_${id}" onchange="togglePanel('${id}', 'v')">
                <span>${cat}</span>
            </div>
            <div id="v_panel_${id}" class="nested-panel v-panel">
                <div class="pill-grid">${intelData[cat].v.map(v => `<label class="t-pill"><input type="checkbox" class="v-chk-${id}" value="${v}" onchange="togglePanel('${id}', 'b')"><span>${v}</span></label>`).join('')}</div>
                <div id="b_panel_${id}" class="nested-panel b-panel">
                    <div class="pill-grid">${intelData[cat].b.map(b => `<label class="t-pill"><input type="checkbox" class="b-check-${id}" value="${b}"><span>${b}</span></label>`).join('')}</div>
                </div>
            </div>`;
        root.appendChild(div);
    });

    document.getElementById('fleet_ui').innerHTML = fleetList.map((f, i) => `
        <div class="counter-card">
            <span style="font-size:10px; font-weight:bold;">${f}</span>
            <div class="stepper">
                <button onclick="adj(${i},-1)">-</button>
                <input type="text" id="f_qty_${i}" value="0" readonly>
                <button onclick="adj(${i},1)">+</button>
            </div>
        </div>`).join('');

    map = L.map('map').setView([24.5854, 73.7125], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    refreshHistory();
}

// FIX 1: CONTACT MIRRORING
function mirror(src, target) {
    document.getElementById(target).value = document.getElementById(src).value;
}

// FIX 2: REVERSE GEOCODING WITH USER AGENT
async function getGPS() {
    if (!navigator.geolocation) return alert("GPS not supported");
    document.getElementById('loader').style.display = 'flex';
    document.getElementById('status_msg').innerText = "Acquiring Satellites...";

    navigator.geolocation.getCurrentPosition(async (pos) => {
        const { latitude, longitude } = pos.coords;
        document.getElementById('gps_val').value = `${latitude.toFixed(6)}, ${longitude.toFixed(6)}`;
        if(marker) map.removeLayer(marker);
        marker = L.marker([latitude, longitude]).addTo(map);
        map.setView([latitude, longitude], 17);
        
        try {
            // Using User-Agent header and formatv2 for better reliability
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${latitude}&lon=${longitude}`, {
                headers: { 'User-Agent': 'InfraDepotIntelligence/1.0' }
            });
            const data = await res.json();
            document.getElementById('business_address').value = data.display_name || "Address found, but details missing.";
        } catch (e) {
            document.getElementById('business_address').value = "GPS Fix ok, but address lookup failed (Network).";
        }
        document.getElementById('loader').style.display = 'none';
    }, () => {
        alert("GPS Access Denied. Please enable location.");
        document.getElementById('loader').style.display = 'none';
    }, { enableHighAccuracy: true });
}

function updateID() {
    const keys = {"Sand":"S", "Stone":"ST", "Cement":"C", "TMTSteel":"T", "Aggregates":"A"};
    let p = "ID";
    Object.keys(keys).forEach(k => {
        if(document.getElementById(`main_${k.replace(/[^\w]/g, '')}`)?.checked) p += keys[k];
    });
    const rand = Math.floor(1000 + Math.random() * 9000);
    document.getElementById('sup_id').innerText = `${p}-${rand}`;
}

function adj(i, d) { let el = document.getElementById('f_qty_'+i); el.value = Math.max(0, (parseInt(el.value) || 0) + d); }
function handleHeaderClick(e, id) { if(e.target.tagName !== 'INPUT') { const cb = document.getElementById(`main_${id}`); cb.checked = !cb.checked; togglePanel(id, 'v'); } }

function togglePanel(id, level) {
    if(level === 'v') {
        const isChecked = document.getElementById(`main_${id}`).checked;
        document.getElementById(`v_panel_${id}`).style.display = isChecked ? 'block' : 'none';
        if(!isChecked) document.getElementById(`b_panel_${id}`).style.display = 'none';
    } else {
        const anyV = Array.from(document.querySelectorAll(`.v-chk-${id}:checked`)).length > 0;
        document.getElementById(`b_panel_${id}`).style.display = anyV ? 'block' : 'none';
    }
    updateID();
}

function handlePhotos(input) {
    Array.from(input.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = (e) => { activePhotos.push(e.target.result); renderPreviews(); };
        reader.readAsDataURL(file);
    });
}

function renderPreviews() {
    const zone = document.getElementById('preview_zone'); zone.innerHTML = '';
    activePhotos.forEach((src) => {
        const wrap = document.createElement('div'); wrap.className = 'thumb-wrapper';
        wrap.innerHTML = `<img src="${src}" class="thumb">`;
        zone.appendChild(wrap);
    });
}

function saveLocal() {
    const data = getEntryData();
    if(!data.Firm) return alert("Firm Name Required");
    let db = JSON.parse(localStorage.getItem('infra_intel_db') || "[]");
    db.unshift(data);
    localStorage.setItem('infra_intel_db', JSON.stringify(db));
    alert("Saved to device storage!");
    refreshHistory();
}

async function submitData() {
    saveLocal();
    document.getElementById('loader').style.display = 'flex';
    document.getElementById('status_msg').innerText = "Uploading to Network...";
    setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
        alert("Data Pushed Successfully!");
    }, 1500);
}

function syncCloud() {
    document.getElementById('loader').style.display = 'flex';
    document.getElementById('status_msg').innerText = "Re-Syncing Database...";
    setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
        alert("Cloud and Local records are now in sync.");
    }, 2000);
}

function getEntryData() {
    let intel = [];
    Object.keys(intelData).forEach(cat => {
        const id = cat.replace(/[^\w]/g, '');
        if(document.getElementById(`main_${id}`).checked) {
            const v = Array.from(document.querySelectorAll(`.v-chk-${id}:checked`)).map(x => x.value);
            const b = Array.from(document.querySelectorAll(`.b-check-${id}:checked`)).map(x => x.value);
            intel.push(`${cat}: [${v.join('/')}] Brands: [${b.join('/')}]`);
        }
    });
    return {
        ID: document.getElementById('sup_id').innerText,
        Firm: document.getElementById('firm_name').value,
        GPS: document.getElementById('gps_val').value,
        Intelligence: intel.join(' | '),
        Timestamp: new Date().toLocaleString()
    };
}

function refreshHistory() {
    const db = JSON.parse(localStorage.getItem('infra_intel_db') || "[]");
    document.getElementById('history_list').innerHTML = db.slice(0, 5).map(s => `
        <div class="history-card">
            <b>${s.Firm}</b> <span style="float:right; color:var(--orange)">${s.ID}</span><br>
            <small>${s.Timestamp}</small>
        </div>`).join('');
}

window.onload = init;
</script>
</body>
</html>

<script>
/** * EV001: Live Sync & CORS Bypass Fix
 * Version: TESTV01.3
 */

const CLOUD_CONFIG = {
    scriptUrl: 'https://script.google.com/macros/s/AKfycbyBe9D2_FMlUyGVznsSUscOC-WT2Wzbl67By1BA6APEGv23ddbarvffU2D1VG-E3lQy/exec',
    version: 'TESTV01'
};

// Override BV001 submitData with Cloud connectivity logic
window.submitData = async function() {
    // 1. Mandatory Local Backup
    saveLocal();
    
    const loader = document.getElementById('loader');
    const statusMsg = document.getElementById('status_msg');
    
    loader.style.display = 'flex';
    statusMsg.innerText = "Nirmansutra Sync in progress...";

    try {
        const data = getEntryData();
        data.AppVersion = CLOUD_CONFIG.version;
        data.Source = "Nirmansutra_PWA";

        // Transmit using text/plain to bypass CORS Preflight checks
        await fetch(CLOUD_CONFIG.scriptUrl, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'text/plain' }, 
            body: JSON.stringify(data)
        });

        loader.style.display = 'none';
        alert("Success! Data synced to Cloud & Local Storage.");
        
    } catch (error) {
        console.error("Sync Error:", error);
        loader.style.display = 'none';
        alert("Network Offline. Data secured locally in your History.");
    }
};

window.syncCloud = function() {
    alert("EV001: Continuous Cloud Sync is Active.");
};
</script>

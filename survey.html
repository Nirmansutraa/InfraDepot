<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfraDepot Survey</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { font-family: Arial; background:#f4f6f9; margin:0; }
.container { padding:10px; }
.card { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; }
.section-title { font-size:12px; color:#888; margin-bottom:8px; }
input { width:100%; padding:10px; margin:5px 0; border-radius:8px; border:1px solid #ccc; }
.row { display:flex; gap:8px; }
.dark-box { background:#0f1b2d; color:#00ffcc; padding:15px; border-radius:8px; text-align:center; }
.map { height:150px; border-radius:8px; margin-bottom:10px; }
.btn { padding:12px; border:none; border-radius:8px; width:100%; margin-top:5px; }
.btn-dark { background:#0f1b2d; color:white; }
.btn-green { background:#2ecc71; color:white; }
.material { background:#0f1b2d; color:white; padding:10px; margin-bottom:6px; border-radius:8px; }
.counter { display:flex; justify-content:space-between; margin-bottom:8px; }
.counter button { width:30px; height:30px; }
.hidden { display:none; }
.photo-preview img { width:70px; margin:5px; border-radius:6px; }
</style>
</head>

<body>

<div class="container">

<!-- CONTACT -->
<div class="card">
<div class="section-title">CONTACT</div>

<input id="ownerName" placeholder="Owner Name">

<div class="row">
<input id="ownerPhone" placeholder="Phone" oninput="syncWhatsApp('owner')">
<input id="ownerWhatsapp" placeholder="WhatsApp">
</div>

<input id="managerName" placeholder="Manager Name">

<div class="row">
<input id="managerPhone" placeholder="Phone" oninput="syncWhatsApp('manager')">
<input id="managerWhatsapp" placeholder="WhatsApp">
</div>

<input id="address" placeholder="Main Office Address">

</div>

<!-- GPS -->
<div class="card">
<div class="section-title">GPS</div>

<div id="map" class="map"></div>

<button class="btn btn-dark" onclick="captureGPS()">Capture GPS</button>
<input id="coordinates">

</div>

<!-- PHOTO -->
<div class="card">
<div class="section-title">Business Photos (Max 10)</div>

<input type="file" accept="image/*" capture="environment" onchange="handlePhoto(event)">
<div id="photos" class="photo-preview"></div>

</div>

<!-- MATERIAL -->
<div class="card">
<div class="section-title">Materials</div>

<div id="materialsContainer"></div>

</div>

<!-- FLEET -->
<div class="card">
<div class="section-title">Fleet</div>
<div id="fleetContainer"></div>
</div>

<!-- ACTION -->
<div class="card">
<button class="btn" onclick="saveLocal()">SAVE LOCAL</button>
<button class="btn btn-green" onclick="syncCloud()">SYNC CLOUD</button>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ================= MAP =================
let map = L.map('map').setView([24.5854,73.7125],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let marker;

function captureGPS(){
navigator.geolocation.getCurrentPosition(async pos=>{
let lat=pos.coords.latitude;
let lng=pos.coords.longitude;

document.getElementById("coordinates").value=lat+","+lng;

if(marker) map.removeLayer(marker);
marker=L.marker([lat,lng]).addTo(map);
map.setView([lat,lng],15);

// Reverse Geocode
let res=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
let data=await res.json();
document.getElementById("address").value=data.display_name;
});
}

// ================= AUTO WHATSAPP =================
function syncWhatsApp(type){
let phone=document.getElementById(type+"Phone").value;
let whatsapp=document.getElementById(type+"Whatsapp");

if(!whatsapp.dataset.modified){
whatsapp.value=phone;
}
}

document.querySelectorAll("#ownerWhatsapp,#managerWhatsapp").forEach(el=>{
el.addEventListener("input",()=>{el.dataset.modified=true});
});

// ================= PHOTO =================
let photos=[];

function handlePhoto(e){
if(photos.length>=10) return alert("Max 10 photos");

let file=e.target.files[0];
compressImage(file,512).then(blob=>{
let reader=new FileReader();
reader.onload=function(){
photos.push({
data:reader.result,
time:new Date().toISOString(),
gps:document.getElementById("coordinates").value
});

renderPhotos();
};
reader.readAsDataURL(blob);
});
}

function renderPhotos(){
let div=document.getElementById("photos");
div.innerHTML="";
photos.forEach(p=>{
let img=document.createElement("img");
img.src=p.data;
div.appendChild(img);
});
}

// Compress
function compressImage(file,maxKB){
return new Promise(resolve=>{
let img=new Image();
let reader=new FileReader();
reader.onload=e=>img.src=e.target.result;
reader.readAsDataURL(file);

img.onload=()=>{
let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

canvas.width=img.width*0.6;
canvas.height=img.height*0.6;

ctx.drawImage(img,0,0,canvas.width,canvas.height);

canvas.toBlob(blob=>{
resolve(blob);
},"image/jpeg",0.7);
};
});
}

// ================= MATERIAL =================
const materialsData = {
"Sand":["River Sand","M-Sand","Plaster Sand"],
"Aggregates":["10mm","20mm","40mm"],
"Masonry Stone":["Granite","Limestone","Sandstone"],
"TMT Steel":["Fe500","Fe550","Fe600"],
"Cement":["OPC","PPC","White Cement"],
"Bricks":["Red Brick","Fly Ash Brick","AAC Block"]
};

let container=document.getElementById("materialsContainer");

Object.keys(materialsData).forEach(mat=>{
let div=document.createElement("div");
div.className="material";

div.innerHTML=`
<label><input type="checkbox" onchange="toggleMaterial('${mat}')"> ${mat}</label>
<div id="${mat}" class="hidden"></div>
`;

container.appendChild(div);
});

function toggleMaterial(mat){
let el=document.getElementById(mat);
if(el.classList.contains("hidden")){
el.classList.remove("hidden");

let varieties=materialsData[mat];
el.innerHTML=varieties.map(v=>`
<div>
<input type="checkbox"> ${v}
</div>
`).join("");

}else{
el.classList.add("hidden");
}
}

// ================= FLEET =================
const fleet=["Tractor","Mini Truck","Truck","Mini Dumper","Dumper","Trailer"];
let fleetDiv=document.getElementById("fleetContainer");

fleet.forEach(f=>{
let id=f.replace(" ","");
fleetDiv.innerHTML+=`
<div class="counter">${f}
<div>
<button onclick="update('${id}',-1)">-</button>
<span id="${id}">0</span>
<button onclick="update('${id}',1)">+</button>
</div>
</div>
`;
});

function update(id,val){
let el=document.getElementById(id);
let v=parseInt(el.innerText);
v+=val;
if(v<0)v=0;
el.innerText=v;
}

// ================= INDEXED DB =================
let db;
let req=indexedDB.open("InfraDepotDB",1);

req.onupgradeneeded=e=>{
db=e.target.result;
db.createObjectStore("survey",{keyPath:"id",autoIncrement:true});
};

req.onsuccess=e=>{db=e.target.result};

function saveLocal(){
let tx=db.transaction("survey","readwrite");
let store=tx.objectStore("survey");

let data=getFormData();
store.add(data);

alert("Saved Offline");
}

// ================= FIREBASE (HOOK) =================
function syncCloud(){
let data=getFormData();

// 🔥 Add Firebase Firestore here
console.log("Syncing:",data);

alert("Sync logic ready (connect Firebase)");
}

// ================= DATA =================
function getFormData(){
return{
owner:document.getElementById("ownerName").value,
phone:document.getElementById("ownerPhone").value,
whatsapp:document.getElementById("ownerWhatsapp").value,
manager:document.getElementById("managerName").value,
gps:document.getElementById("coordinates").value,
address:document.getElementById("address").value,
photos:photos
};
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfraDepot | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <div id="status-bar" class="bg-blue-600 text-white text-center py-2 text-[10px] font-black uppercase tracking-widest">
        Engine Status: Connecting...
    </div>

    <div class="p-6 max-w-6xl mx-auto">
        <header class="mb-10 flex justify-between items-center">
            <h1 class="text-3xl font-black text-emerald-400 italic">INFRADEPOT <span class="text-white not-italic font-light">| HQ</span></h1>
            <div id="user-display" class="bg-slate-800 px-4 py-2 rounded-xl text-xs font-bold border border-slate-700">Checking Identity...</div>
        </header>

        <div id="main-display" class="bg-slate-800 rounded-[2.5rem] p-8 border border-slate-700 shadow-2xl min-h-[500px] flex items-center justify-center">
            <div class="text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-emerald-500 mx-auto mb-4"></div>
                <p class="text-slate-400 font-mono text-sm">Synchronizing with Intelligence Cloud...</p>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        // LOAD FIREBASE
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
            authDomain: "infradepo.firebaseapp.com",
            projectId: "infradepo",
            storageBucket: "infradepo.firebasestorage.app",
            messagingSenderId: "733942710671",
            appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        console.log("FIREBASE INITIALIZED"); // SHOULD APPEAR IN CONSOLE

        onAuthStateChanged(auth, async (user) => {
            const bar = document.getElementById('status-bar');
            const display = document.getElementById('main-display');
            const userBox = document.getElementById('user-display');

            if (user) {
                console.log("USER DETECTED:", user.uid);
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists() && userDoc.data().role === 'admin') {
                        bar.innerText = "ACCESS GRANTED: SUPER ADMIN ACTIVE";
                        bar.className = "bg-emerald-500 text-slate-900 text-center py-2 text-[10px] font-black uppercase tracking-widest";
                        userBox.innerText = "WELCOME, " + (userDoc.data().name || "VIJAY");
                        
                        // LOAD MAP
                        display.innerHTML = '<div id="map" class="w-full h-[500px] rounded-3xl"></div>';
                        const map = L.map('map').setView([24.5854, 73.7125], 13);
                        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
                    } else {
                        bar.innerText = "ACCESS DENIED: NOT AUTHORIZED";
                        bar.className = "bg-rose-600 text-white text-center py-2 text-[10px] font-black uppercase tracking-widest";
                        display.innerHTML = '<div class="text-rose-500 font-bold text-xl uppercase">Intrusion Detected. UID not in Admin Registry.</div>';
                    }
                } catch (err) {
                    bar.innerText = "CLOUD ERROR: " + err.code;
                }
            } else {
                bar.innerText = "NO SESSION: REDIRECTING...";
                window.location.href = "login.html";
            }
        });
    </script>
</body>
</html>

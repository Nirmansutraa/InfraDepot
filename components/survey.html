
<div class="survey-container">

<h2>Supplier Survey</h2>

<div class="form-group">
<label>Firm Name</label>
<input id="firm_name" placeholder="Enter firm name">
</div>

<div class="form-group">
<label>Owner Name</label>
<input id="owner_name" placeholder="Owner name">
</div>

<div class="form-group">
<label>Owner Phone</label>
<input id="owner_phone" placeholder="Mobile number">
</div>

<div class="form-group">
<label>Business Address</label>
<textarea id="business_address"></textarea>
</div>

<div class="form-group">
<label>Materials Supplied</label>

<div id="materials_list"></div>

</div>

<div class="form-group">
<label>Fleet</label>

<div id="fleet_list"></div>

</div>

<button onclick="submitSurvey()">
Submit Supplier
</button>

<br><br>

<button onclick="showDashboard()">
Back to Dashboard
</button>

</div>
<div class="form-group">

<label>GPS Location</label>

<input 
id="gps_val" 
placeholder="Location will appear here"
readonly
>

<button onclick="captureGPS()">
Capture Location
</button>

</div>

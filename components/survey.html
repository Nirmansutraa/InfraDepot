<div style="max-width:600px;margin:auto;font-family:system-ui;background:#F5F7FA;padding-bottom:40px">

<div style="text-align:center;padding:18px">

<span style="font-size:26px;font-weight:700;color:#2F3A45">Infra</span>
<span style="font-size:26px;font-weight:700;color:#FF6A00">Depot</span>

<div style="font-size:12px;color:#64748B">
Supplier Intelligence
</div>

</div>


<div style="background:white;border-radius:12px;padding:16px;margin:12px;box-shadow:0 2px 6px rgba(0,0,0,0.08)">

<h3>Supplier Survey</h3>

<label>Firm Name</label>
<input id="firm_name">

<label>Owner Name</label>
<input id="owner_name">

<label>Owner Mobile</label>
<input id="owner_mobile">

<label>Owner WhatsApp</label>
<input id="owner_whatsapp">

<hr>

<label>Manager Name</label>
<input id="manager_name">

<label>Manager Mobile</label>
<input id="manager_mobile">

<label>Manager WhatsApp</label>
<input id="manager_whatsapp">

<hr>

<h4>Material Intelligence</h4>

<div id="material_selector"></div>

<hr>

<label>GPS</label>
<input id="gps_val">

<div id="map" style="height:250px"></div>

<label>Address</label>
<textarea id="address_val"></textarea>

<button onclick="saveSupplier()">Save Supplier</button>

</div>


<script src="../data/materials.js"></script>
<script src="../js/materialsEngine.js"></script>
<script src="../js/mapEngine.js"></script>

<script>

document.addEventListener("DOMContentLoaded",function(){

loadMaterialSelector()
initSupplierMap()

})

function saveSupplier(){

const materials =
Array.from(document.querySelectorAll('.material:checked'))
.map(x=>x.value)

const supplier={

firm:document.getElementById("firm_name").value,
owner:document.getElementById("owner_name").value,
owner_mobile:document.getElementById("owner_mobile").value,
owner_whatsapp:document.getElementById("owner_whatsapp").value,
manager_name:document.getElementById("manager_name").value,
manager_mobile:document.getElementById("manager_mobile").value,
manager_whatsapp:document.getElementById("manager_whatsapp").value,
materials:materials.join(", "),
gps:document.getElementById("gps_val").value,
address:document.getElementById("address_val").value

}

let data = localStorage.getItem("infra_suppliers")

let suppliers = data ? JSON.parse(data) : []

suppliers.push(supplier)

localStorage.setItem(
"infra_suppliers",
JSON.stringify(suppliers)
)

alert("Supplier Saved")

}

</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfraDepot | Commander HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>#map { height: 500px; width: 100%; z-index: 1; border-radius: 2rem; }</style>
</head>
<body class="bg-slate-950 text-slate-100 flex min-h-screen font-sans">

    <aside class="w-72 bg-slate-900 border-r border-slate-800 flex flex-col p-8 sticky top-0 h-screen">
        <div class="mb-12">
            <h1 class="text-2xl font-black text-emerald-400 tracking-tighter italic">INFRADEPOT</h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em] mt-1">Udaipur Control</p>
        </div>
        
        <nav class="space-y-3 flex-1">
            <button onclick="showTab('map-tab')" class="tab-btn w-full text-left p-4 rounded-2xl bg-emerald-500/10 text-emerald-400 font-bold border border-emerald-500/20 transition-all">📍 Intel Map</button>
            <button onclick="showTab('staff-tab')" class="tab-btn w-full text-left p-4 rounded-2xl hover:bg-slate-800 text-slate-400 font-bold transition-all">👥 Access Control</button>
            <button onclick="showTab('brands-tab')" class="tab-btn w-full text-left p-4 rounded-2xl hover:bg-slate-800 text-slate-400 font-bold transition-all">🏗️ Brand Registry</button>
        </nav>

        <div class="pt-6 border-t border-slate-800">
            <div id="user-display" class="text-[10px] font-black text-emerald-500 uppercase">Verifying...</div>
            <button onclick="logout()" class="text-[10px] text-rose-500 font-bold uppercase mt-2 hover:underline">Logout</button>
        </div>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        
        <section id="map-tab" class="tab-content space-y-6">
            <header class="flex justify-between items-end mb-4">
                <h2 class="text-4xl font-black tracking-tighter">Market Intelligence</h2>
                <div class="text-right">
                    <span id="ping-count" class="text-3xl font-black text-white">0</span>
                    <p class="text-[10px] text-slate-500 font-bold uppercase">Shops Mapped</p>
                </div>
            </header>
            <div class="bg-slate-900 rounded-[3rem] p-4 border border-slate-800 shadow-2xl"><div id="map"></div></div>
        </section>

        <section id="staff-tab" class="tab-content hidden space-y-8">
            <header><h2 class="text-4xl font-black tracking-tighter">Access Control (RBAC)</h2></header>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-slate-900 p-8 rounded-[2.5rem] border border-slate-800 shadow-xl">
                    <h3 class="font-bold mb-6 text-emerald-400 uppercase text-xs tracking-widest">Authorize Personnel</h3>
                    <input id="new-uid" type="text" placeholder="Paste User UID" class="w-full bg-black border border-slate-800 p-4 rounded-2xl mb-4 text-white focus:ring-1 focus:ring-emerald-500 outline-none">
                    <select id="new-role" class="w-full bg-black border border-slate-800 p-4 rounded-2xl mb-6 text-white">
                        <option value="field_staff">Field Staff (Capture Only)</option>
                        <option value="admin_staff">Admin Staff (View Only)</option>
                        <option value="admin">Super Admin (Full Control)</option>
                    </select>
                    <button onclick="saveAccess()" class="w-full bg-emerald-500 text-slate-950 font-black p-4 rounded-2xl hover:bg-emerald-400 transition-all">GRANT ACCESS</button>
                </div>
                <div class="bg-slate-900 p-8 rounded-[2.5rem] border border-slate-800 shadow-xl h-[450px] flex flex-col">
                    <h3 class="font-bold mb-6 text-slate-500 uppercase text-xs tracking-widest">Active Registry</h3>
                    <div id="registry-list" class="space-y-3 overflow-y-auto pr-2 custom-scrollbar"></div>
                </div>
            </div>
        </section>

        <section id="brands-tab" class="tab-content hidden">
            <h2 class="text-4xl font-black tracking-tighter mb-8">Brand Registry</h2>
            <div class="bg-slate-900 p-8 rounded-[3rem] border border-slate-800">Coming Soon: Central Brand Management</div>
        </section>

    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
            authDomain: "infradepo.firebaseapp.com",
            projectId: "infradepo",
            storageBucket: "infradepo.firebasestorage.app",
            messagingSenderId: "733942710671",
            appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI Helpers
        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        window.logout = () => signOut(auth).then(() => window.location.href = "index.html");

        // Map Initialization
        const map = L.map('map').setView([24.5854, 73.7125], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-display').innerText = "SUPER ADMIN ACTIVE";
                syncRegistry();
                syncMap();
            } else {
                window.location.href = "index.html";
            }
        });

        // 🟢 SYNC RBAC REGISTRY
        function syncRegistry() {
            onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById('registry-list');
                list.innerHTML = '';
                snap.forEach(uDoc => {
                    const u = uDoc.data();
                    list.innerHTML += `
                        <div class="bg-black p-4 rounded-2xl border border-slate-800 flex justify-between items-center">
                            <div>
                                <div class="text-[10px] font-black text-emerald-500 uppercase">${u.role}</div>
                                <div class="text-xs font-bold text-slate-300">${uDoc.id.substring(0,12)}...</div>
                            </div>
                            <button onclick="revoke('${uDoc.id}')" class="text-rose-500 text-[10px] font-bold hover:underline">REVOKE</button>
                        </div>`;
                });
            });
        }

        window.saveAccess = async () => {
            const uid = document.getElementById('new-uid').value;
            const role = document.getElementById('new-role').value;
            if(!uid) return alert("Paste a valid UID");
            await setDoc(doc(db, "users", uid), { role: role });
            document.getElementById('new-uid').value = '';
            alert("Access Granted!");
        };

        window.revoke = async (uid) => {
            if(confirm("Permanently revoke access?")) await deleteDoc(doc(db, "users", uid));
        };

        // 🔵 SYNC MAP DATA
        function syncMap() {
            onSnapshot(collection(db, "surveys"), (snap) => {
                document.getElementById('ping-count').innerText = snap.size;
                snap.forEach(sDoc => {
                    const s = sDoc.data();
                    L.marker([s.location.lat, s.location.lng]).addTo(map).bindPopup(`<b>${s.firmName}</b>`);
                });
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirmansutra HQ | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .sidebar-item { transition: 0.2s; cursor: pointer; border-left: 4px solid transparent; }
        .sidebar-item:hover, .sidebar-item.active { background: #1e293b; border-left-color: #FF5A00; color: white; }
        #map { height: 100%; width: 100%; border-radius: 20px; z-index: 1; }
        .hidden { display: none !important; }
        .glass-card { background: white; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-[#0B1B33] text-slate-400 flex flex-col shadow-2xl z-50">
        <div class="p-8 flex items-center gap-3">
            <div class="w-10 h-10 bg-[#FF5A00] rounded-xl flex items-center justify-center font-black text-white text-xl shadow-lg shadow-orange-500/20">N</div>
            <span class="text-white font-black tracking-tighter uppercase">Nirmansutra</span>
        </div>

        <nav class="flex-1 px-4 space-y-2">
            <div onclick="switchTab('map-view')" class="sidebar-item active p-4 rounded-lg flex items-center gap-3">
                <span class="text-lg">📍</span> <span class="text-xs font-bold uppercase tracking-widest">Live Map</span>
            </div>
            <div onclick="switchTab('material-view')" class="sidebar-item p-4 rounded-lg flex items-center gap-3">
                <span class="text-lg">🏗️</span> <span class="text-xs font-bold uppercase tracking-widest">Materials</span>
            </div>
            <div onclick="switchTab('user-view')" class="sidebar-item p-4 rounded-lg flex items-center gap-3">
                <span class="text-lg">👥</span> <span class="text-xs font-bold uppercase tracking-widest">User Roles</span>
            </div>
            <div onclick="switchTab('data-view')" class="sidebar-item p-4 rounded-lg flex items-center gap-3">
                <span class="text-lg">📊</span> <span class="text-xs font-bold uppercase tracking-widest">Field Data</span>
            </div>
        </nav>

        <div class="p-6 border-t border-slate-800">
            <button onclick="logout()" class="w-full py-3 rounded-lg border border-slate-700 text-[10px] font-bold uppercase hover:bg-red-500 hover:text-white transition-all">Sign Out</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        
        <header class="h-20 bg-white border-b px-8 flex justify-between items-center">
            <h2 id="tab-title" class="text-xl font-900 text-slate-800 uppercase italic">Intelligence Map</h2>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p id="admin-name" class="text-xs font-black text-slate-900 leading-none">Vijay Sharma</p>
                    <p class="text-[9px] font-bold text-orange-500 uppercase tracking-widest">Super Admin</p>
                </div>
                <div class="w-10 h-10 bg-slate-100 rounded-full border-2 border-orange-500"></div>
            </div>
        </header>

        <section class="flex-1 p-8 overflow-y-auto">
            
            <div id="map-view" class="h-full">
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-6">
                    <div class="glass-card p-6 rounded-2xl border-t-4 border-orange-500">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Total Suppliers</p>
                        <h3 id="stat-suppliers" class="text-3xl font-black text-slate-800">0</h3>
                    </div>
                    <div class="glass-card p-6 rounded-2xl border-t-4 border-emerald-500">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Active Staff</p>
                        <h3 id="stat-staff" class="text-3xl font-black text-slate-800">0</h3>
                    </div>
                </div>
                <div class="glass-card h-3/4 rounded-3xl overflow-hidden relative">
                    <div id="map"></div>
                </div>
            </div>

            <div id="material-view" class="hidden space-y-6">
                <div class="glass-card p-8 rounded-3xl">
                    <h3 class="text-lg font-bold mb-4">Add New Brand to Registry</h3>
                    <div class="flex gap-4">
                        <input id="new-brand-name" type="text" placeholder="Brand Name (e.g. ACC)" class="flex-1 p-4 bg-slate-50 border rounded-xl outline-none">
                        <select id="new-brand-cat" class="p-4 bg-slate-50 border rounded-xl outline-none">
                            <option>Cement</option>
                            <option>Steel</option>
                            <option>Sand</option>
                        </select>
                        <button onclick="addNewBrand()" class="bg-[#FF5A00] text-white px-8 rounded-xl font-bold">Add Brand</button>
                    </div>
                </div>
                <div id="brand-list" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    </div>
            </div>

            <div id="user-view" class="hidden">
                <div class="glass-card rounded-3xl overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-6 text-[10px] font-bold uppercase text-slate-400">User Email</th>
                                <th class="p-6 text-[10px] font-bold uppercase text-slate-400">Current Role</th>
                                <th class="p-6 text-[10px] font-bold uppercase text-slate-400">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="user-table-body">
                            </tbody>
                    </table>
                </div>
            </div>

        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
            authDomain: "infradepo.firebaseapp.com",
            projectId: "infradepo",
            storageBucket: "infradepo.firebasestorage.app",
            messagingSenderId: "733942710671",
            appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // 🧠 TAB SWITCHER
        function switchTab(tabId) {
            document.querySelectorAll('main section > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('tab-title').innerText = event.currentTarget.innerText;
        }

        // 📍 MAP INITIALIZATION
        let map = L.map('map').setView([24.5854, 73.7125], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 📡 LIVE DATA LISTENERS
        db.collection("field_data").onSnapshot(snap => {
            document.getElementById('stat-suppliers').innerText = snap.size;
            snap.forEach(doc => {
                const d = doc.data();
                if(d.latitude) L.marker([d.latitude, d.longitude]).addTo(map).bindPopup(`<b>${d.firmName}</b>`);
            });
        });

        db.collection("users").onSnapshot(snap => {
            document.getElementById('stat-staff').innerText = snap.size;
            const table = document.getElementById('user-table-body');
            table.innerHTML = "";
            snap.forEach(doc => {
                const u = doc.data();
                table.innerHTML += `
                    <tr class="border-b">
                        <td class="p-6 font-bold text-slate-700">${u.email}</td>
                        <td class="p-6"><span class="bg-slate-100 px-3 py-1 rounded-full text-[10px] font-bold uppercase">${u.role}</span></td>
                        <td class="p-6">
                            <button onclick="updateRole('${doc.id}', 'admin')" class="text-orange-500 text-[10px] font-bold uppercase mr-4">Make Admin</button>
                            <button onclick="updateRole('${doc.id}', 'field_staff')" class="text-slate-400 text-[10px] font-bold uppercase">Make Staff</button>
                        </td>
                    </tr>
                `;
            });
        });

        function updateRole(uid, role) {
            db.collection("users").doc(uid).update({ role: role });
        }

        function logout() { auth.signOut().then(() => window.location.href="index.html"); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirmansutra HQ | Master Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        #map { height: 100%; width: 100%; border-radius: 24px; z-index: 1; }
        .sidebar-item { transition: 0.2s; cursor: pointer; border-left: 4px solid transparent; }
        .sidebar-item.active { background: #1e293b; border-left-color: #FF5A00; color: white; }
        .glass-card { background: white; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
        #security-shield { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-slate-900">

    <div id="security-shield">
        <div class="w-12 h-12 border-4 border-gray-100 border-t-[#FF5A00] rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Master Clearance Check...</p>
    </div>

    <aside class="w-64 bg-[#0B1B33] text-slate-400 flex flex-col shadow-2xl z-50">
        <div class="p-8 flex items-center gap-3">
            <div class="w-10 h-10 bg-[#FF5A00] rounded-xl flex items-center justify-center font-black text-white text-xl">N</div>
            <span class="text-white font-black tracking-tighter uppercase text-sm">Nirmansutra</span>
        </div>

        <nav class="flex-1 px-4 space-y-2">
            <div onclick="switchTab('map-view')" class="sidebar-item active p-4 rounded-lg flex items-center gap-3">
                <span class="text-sm">📍</span> <span class="text-[10px] font-bold uppercase tracking-widest">Live Intel Map</span>
            </div>
            <div onclick="switchTab('user-view')" class="sidebar-item p-4 rounded-lg flex items-center gap-3">
                <span class="text-sm">👥</span> <span class="text-[10px] font-bold uppercase tracking-widest">Team Access</span>
            </div>
        </nav>

        <div class="p-6 border-t border-slate-800">
            <button onclick="logout()" class="w-full py-3 rounded-lg border border-slate-700 text-[9px] font-bold uppercase hover:bg-red-500 hover:text-white transition-all">Sign Out</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white border-b px-8 flex justify-between items-center">
            <h2 id="tab-title" class="text-lg font-900 uppercase italic text-slate-800">Intelligence Map</h2>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p id="admin-email" class="text-[11px] font-black text-slate-900 leading-none">---</p>
                    <p class="text-[9px] font-bold text-orange-500 uppercase tracking-widest">Super Admin Control</p>
                </div>
                <div class="w-10 h-10 bg-slate-100 rounded-full border-2 border-orange-500"></div>
            </div>
        </header>

        <section class="flex-1 p-8 overflow-y-auto">
            
            <div id="map-view" class="h-full flex flex-col gap-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="glass-card p-6 rounded-3xl border-t-4 border-orange-500">
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total Suppliers</p>
                        <h3 id="stat-count" class="text-3xl font-black text-slate-800">0</h3>
                    </div>
                </div>
                
                <div class="flex-1 flex gap-6 min-h-0">
                    <div class="flex-[3] glass-card rounded-[2rem] overflow-hidden relative shadow-2xl">
                        <div id="map"></div>
                    </div>
                    <div class="flex-1 glass-card rounded-[2rem] p-6 overflow-y-auto hidden lg:block">
                        <h4 class="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest">Recent Activity</h4>
                        <div id="live-feed" class="space-y-4">
                            </div>
                    </div>
                </div>
            </div>

            <div id="user-view" class="hidden">
                <div class="glass-card rounded-[2rem] overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-6 text-[10px] font-bold uppercase text-slate-400">Email Address</th>
                                <th class="p-6 text-[10px] font-bold uppercase text-slate-400">Role</th>
                                <th class="p-6 text-[10px] font-bold uppercase text-slate-400">Action</th>
                            </tr>
                        </thead>
                        <tbody id="user-table"></tbody>
                    </table>
                </div>
            </div>

        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
            authDomain: "infradepo.firebaseapp.com",
            projectId: "infradepo",
            storageBucket: "infradepo.firebasestorage.app",
            messagingSenderId: "733942710671",
            appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 🛡️ SECURITY PROTOCOL
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = "index.html";
            } else {
                const doc = await db.collection("users").doc(user.uid).get();
                if (doc.exists && (doc.data().role === 'admin' || doc.data().role === 'super_admin')) {
                    document.getElementById('security-shield').style.display = 'none';
                    document.getElementById('admin-email').innerText = user.email;
                    startDashboard();
                } else {
                    alert("Unauthorized Access Attempt. System Lock.");
                    auth.signOut().then(() => window.location.href = "index.html");
                }
            }
        });

        function startDashboard() {
            initMap();
            loadFieldData();
            loadUserData();
        }

        // TABBING
        function switchTab(id) {
            document.querySelectorAll('main section > div').forEach(d => d.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('tab-title').innerText = event.currentTarget.innerText;
        }

        // MAP LOGIC
        let map;
        function initMap() {
            map = L.map('map').setView([24.5854, 73.7125], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        // LIVE SYNC ENGINE
        function loadFieldData() {
            db.collection("field_data").orderBy("timestamp", "desc").onSnapshot(snap => {
                document.getElementById('stat-count').innerText = snap.size;
                const feed = document.getElementById('live-feed');
                feed.innerHTML = "";
                
                snap.forEach(doc => {
                    const d = doc.data();
                    // Add Pin
                    if(d.latitude) {
                        L.marker([d.latitude, d.longitude]).addTo(map)
                         .bindPopup(`<b>${d.firmName}</b><br>Captured by: ${d.capturedBy}`);
                    }
                    // Add to Sidebar Feed
                    feed.innerHTML += `
                        <div class="p-3 bg-slate-50 rounded-xl border border-slate-100">
                            <p class="text-[11px] font-bold text-slate-800">${d.firmName || 'Untitled Shop'}</p>
                            <p class="text-[9px] text-gray-400 uppercase font-black">${d.capturedBy.split('@')[0]}</p>
                        </div>
                    `;
                });
            });
        }

        function loadUserData() {
            db.collection("users").onSnapshot(snap => {
                const table = document.getElementById('user-table');
                table.innerHTML = "";
                snap.forEach(doc => {
                    const u = doc.data();
                    table.innerHTML += `
                        <tr class="border-b">
                            <td class="p-6 text-xs font-bold">${u.email}</td>
                            <td class="p-6"><span class="bg-orange-50 text-[#FF5A00] px-3 py-1 rounded-full text-[9px] font-black uppercase">${u.role}</span></td>
                            <td class="p-6 text-right">
                                <button onclick="setRole('${doc.id}', 'admin')" class="text-orange-500 text-[9px] font-bold uppercase mr-3">Make Admin</button>
                                <button onclick="setRole('${doc.id}', 'field_staff')" class="text-slate-400 text-[9px] font-bold uppercase">Make Staff</button>
                            </td>
                        </tr>
                    `;
                });
            });
        }

        async function setRole(uid, role) {
            await db.collection("users").doc(uid).update({ role: role });
            alert("Role updated.");
        }

        function logout() { auth.signOut().then(() => window.location.href="index.html"); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirmansutra | Enterprise Login</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: white; overflow: hidden; }
        .hero-bg { 
            background: linear-gradient(rgba(2, 6, 23, 0.8), rgba(2, 6, 23, 0.8)), 
            url('https://images.unsplash.com/photo-1541888946425-d81bb19240f5?q=80&w=2070'); 
            background-size: cover; background-position: center; height: 100vh; display: flex; align-items: center; justify-content: center; 
        }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 3rem; }
        .btn-orange { background: #FF5A00; color: white; padding: 18px; border-radius: 16px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-orange:active { transform: scale(0.96); opacity: 0.9; }
        #status-msg { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #64748b; margin-bottom: 2rem; }
        .loader { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #FF5A00; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="hero-bg px-6">
        <div class="glass-panel max-w-sm w-full p-10 text-center shadow-2xl">
            <div class="w-16 h-16 bg-[#FF5A00] rounded-2xl flex items-center justify-center font-black text-2xl mx-auto mb-6 shadow-lg shadow-orange-500/30">N</div>
            
            <h1 class="text-3xl font-black italic tracking-tighter mb-2">NIRMANSUTRA</h1>
            <div id="loader" class="loader"></div>
            <p id="status-msg">Field Intelligence Terminal</p>
            
            <button onclick="login()" id="login-btn" class="btn-orange w-full shadow-xl shadow-orange-500/20">
                Sign in with Google
            </button>

            <p class="mt-8 text-[9px] text-gray-500 font-bold uppercase tracking-widest">© 2026 Nirmansutra Infrastructure</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // 1. CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
            authDomain: "infradepo.firebaseapp.com",
            projectId: "infradepo",
            storageBucket: "infradepo.firebasestorage.app",
            messagingSenderId: "733942710671",
            appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 2. LOGIN ENGINE
        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            // Using popup, but fallback to redirect if blocked
            auth.signInWithPopup(provider).catch(err => {
                console.warn("Popup blocked, trying redirect...");
                auth.signInWithRedirect(provider);
            });
        }

        // 3. AUTH & RBAC ROUTER
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const statusLabel = document.getElementById('status-msg');
                const loginBtn = document.getElementById('login-btn');
                const loader = document.getElementById('loader');

                loginBtn.style.display = 'none';
                loader.style.display = 'block';
                statusLabel.innerText = "Authenticating " + user.email;

                try {
                    // --- MASTER BYPASS FOR VIJAY ---
                    if (user.uid === "T9LAq9SbOWPp7Db9UvaYkW3OfKw1" || user.email === "nirmansutraa@gmail.com") {
                        statusLabel.innerText = "Master Access Granted";
                        
                        // Force update Admin Profile
                        await db.collection("users").doc(user.uid).set({
                            email: user.email,
                            role: 'admin',
                            status: 'active',
                            lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                        }, { merge: true });

                        window.location.href = "admin.html";
                        return;
                    }

                    // --- STANDARD STAFF LOGIC ---
                    const doc = await db.collection("users").doc(user.uid).get();
                    
                    if (doc.exists) {
                        const role = doc.data().role;
                        // Send to Admin if permitted, otherwise Survey
                        window.location.href = (role === 'admin' || role === 'super_admin') ? "admin.html" : "survey.html";
                    } else {
                        // Auto-Register New User as Staff
                        statusLabel.innerText = "Creating Staff Profile...";
                        await db.collection("users").doc(user.uid).set({
                            email: user.email,
                            role: 'field_staff',
                            status: 'active',
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        window.location.href = "survey.html";
                    }
                } catch (error) {
                    console.error("RBAC Critical Failure:", error);
                    statusLabel.innerText = "Permission Error: Contact Vijay";
                    statusLabel.style.color = "#FF5A00";
                    loader.style.display = 'none';
                }
            }
        });
    </script>
</body>
</html>

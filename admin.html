<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfraDepot | Admin Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .sidebar-item:hover { background: #1e293b; }
        .active-tab { border-left: 4px solid #10b981; background: #1e293b; color: white; }
    </style>
</head>
<body class="bg-slate-50 flex font-sans">

    <aside class="w-64 bg-slate-900 h-screen sticky top-0 text-slate-300 hidden md:block">
        <div class="p-6 text-emerald-500 font-black text-xl border-b border-slate-800">🏗️ InfraDepot</div>
        <nav class="mt-6">
            <a href="#" onclick="AdminCore.switchTab('dashboard')" class="sidebar-item p-4 flex items-center gap-3 active-tab">📊 Dashboard</a>
            <a href="#" onclick="AdminCore.switchTab('staff')" class="sidebar-item p-4 flex items-center gap-3">👥 Staff Mgmt</a>
            <a href="#" onclick="AdminCore.switchTab('materials')" class="sidebar-item p-4 flex items-center gap-3">🧱 Materials</a>
            <a href="#" onclick="AdminCore.switchTab('monitoring')" class="sidebar-item p-4 flex items-center gap-3">🗺️ Monitoring</a>
        </nav>
    </aside>

    <main class="flex-1 p-8">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black text-slate-800">Market Intelligence Dashboard</h1>
            <div id="user-badge" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Super Admin</div>
        </header>

        <div id="content-area">
            <div class="animate-pulse flex space-y-4 flex-col">
                <div class="h-32 bg-slate-200 rounded-xl"></div>
                <div class="h-64 bg-slate-200 rounded-xl"></div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="./js/firebase-config.js"></script>
    <script type="module" src="./js/admin-core.js"></script>
</body>
</html>

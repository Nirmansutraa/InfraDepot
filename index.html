<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <title>NirmaSutra Intelligence Network</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /**
         * GLOBAL DESIGN TOKENS
         */
        :root {
            --orange: #ff6a00;
            --orange-soft: rgba(255, 106, 0, 0.1);
            --orange-glow: rgba(255, 106, 0, 0.4);
            --dark: #0f172a;
            --darker: #020617;
            --slate: #64748b;
            --bg: #f8fafc;
            --white: #ffffff;
            --green: #10b981;
            --red: #ef4444;
            --blue: #3b82f6;
            --border: #e2e8f0;
            --glass: rgba(255, 255, 255, 0.05);
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        /**
         * CORE RESET
         */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            line-height: 1.6;
            overflow-x: hidden;
            overscroll-behavior-y: contain;
        }

        /**
         * AUTHENTICATION UI
         */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--dark);
            z-index: 100000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 50px 35px;
            border-radius: 45px;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }

        .sys-logo {
            font-size: 34px;
            font-weight: 900;
            color: var(--orange);
            letter-spacing: -1px;
            margin-bottom: 4px;
        }

        .sys-tag {
            font-size: 10px;
            color: var(--slate);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
            font-weight: 700;
        }

        .input-box {
            position: relative;
            width: 100%;
            margin-bottom: 22px;
        }

        .field {
            width: 100%;
            padding: 22px;
            border-radius: 22px;
            border: 2px solid #334155;
            background-color: var(--darker);
            color: var(--white);
            font-size: 16px;
            text-align: center;
            transition: border-color 0.3s ease;
        }

        .field:focus {
            border-color: var(--orange);
            outline: none;
        }

        .toggle-btn {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--slate);
            font-size: 20px;
            cursor: pointer;
        }

        .action-btn {
            width: 100%;
            padding: 22px;
            border: none;
            border-radius: 22px;
            background-color: var(--orange);
            color: var(--white);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 0 10px 20px var(--orange-glow);
        }

        /**
         * MAIN DASHBOARD
         */
        #app_shell {
            display: none;
            max-width: 800px;
            margin: 0 auto;
            padding-bottom: 140px;
        }

        .pwa-header {
            background-color: var(--dark);
            padding: 70px 25px 35px;
            border-bottom-left-radius: 45px;
            border-bottom-right-radius: 45px;
            color: var(--white);
        }

        .status-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 30px;
        }

        .status-pill {
            background-color: rgba(255, 255, 255, 0.08);
            padding: 18px 10px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .pill-val {
            display: block;
            font-size: 20px;
            font-weight: 900;
        }

        .pill-lbl {
            font-size: 9px;
            color: var(--slate);
            text-transform: uppercase;
            font-weight: 700;
        }

        .card-title {
            padding: 35px 25px 15px;
            font-size: 12px;
            font-weight: 800;
            color: var(--slate);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .ui-card {
            background-color: var(--white);
            margin: 0 20px 20px;
            padding: 28px;
            border-radius: 38px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
        }

        .id-display {
            background-color: var(--darker);
            color: var(--green);
            padding: 22px;
            border-radius: 22px;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 25px;
            border: 2px solid #1e293b;
        }

        #map_box {
            height: 350px;
            width: 100%;
            border-radius: 30px;
            border: 5px solid var(--white);
            box-shadow: var(--shadow-md);
            margin-bottom: 20px;
            background-color: #eee;
        }

        .media-scroller {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 5px 0 20px;
            scrollbar-width: none;
        }

        .img-preview {
            min-width: 150px;
            height: 150px;
            border-radius: 25px;
            object-fit: cover;
            border: 4px solid var(--white);
            box-shadow: var(--shadow-md);
        }

        /**
         * BOTTOM NAVIGATION
         */
        .nav-dock {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background-color: var(--dark);
            padding: 20px;
            border-radius: 35px;
            display: flex;
            gap: 15px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            z-index: 9999;
        }

        .dock-btn {
            flex: 1;
            padding: 20px;
            border: none;
            border-radius: 22px;
            font-weight: 900;
            color: var(--white);
            text-transform: uppercase;
            font-size: 12px;
        }

        /* UTILITIES */
        .hidden { display: none !important; }
        .shake { animation: shake-anim 0.3s ease; border-color: var(--red) !important; }
        @keyframes shake-anim {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            60% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

    <div id="scr_master" class="auth-screen">
        <div class="auth-container">
            <h1 class="sys-logo">NIRMASUTRA</h1>
            <p class="sys-tag">System Master Gate</p>
            <div class="input-box">
                <input type="password" id="m_key" class="field" placeholder="MASTER KEY">
                <button class="toggle-btn" onclick="toggleView('m_key')">👁️</button>
            </div>
            <button class="action-btn" onclick="checkMaster()">Authorize System</button>
            <p id="m_msg" style="color:var(--red); font-size:11px; margin-top:20px; font-weight:800;"></p>
        </div>
    </div>

    <div id="scr_user" class="auth-screen hidden">
        <div class="auth-container">
            <h1 class="sys-logo">OPERATOR</h1>
            <p class="sys-tag">Identity Validation</p>
            <div class="input-box">
                <input type="text" id="u_id" class="field" placeholder="USER ID (NSID001)">
            </div>
            <div class="input-box">
                <input type="password" id="u_key" class="field" placeholder="PASSWORD">
                <button class="toggle-btn" onclick="toggleView('u_key')">👁️</button>
            </div>
            <button class="action-btn" onclick="checkUser()" style="background-color:var(--blue);">Sign In</button>
            <p id="u_msg" style="color:var(--red); font-size:11px; margin-top:20px; font-weight:800;"></p>
        </div>
    </div>

    <main id="app_shell">
        <header class="pwa-header">
            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                <div>
                    <p style="font-size:9px; color:var(--slate); font-weight:900; letter-spacing:1px;">SESSION ACTIVE</p>
                    <h2 id="disp_user" style="font-size:28px;">NSID000</h2>
                </div>
                <button onclick="logOut()" style="background:var(--red); border:none; color:white; padding:12px 20px; border-radius:18px; font-size:10px; font-weight:900;">EXIT</button>
            </div>
            <div class="status-row">
                <div class="status-pill"><span class="pill-val" id="cnt_local">0</span><span class="pill-lbl">Queue</span></div>
                <div class="status-pill"><span class="pill-val" id="cnt_media">0</span><span class="pill-lbl">Media</span></div>
                <div class="status-pill"><span class="pill-val" id="cnt_gps" style="color:var(--red);">OFF</span><span class="pill-lbl">GPS</span></div>
            </div>
        </header>

        <h3 class="card-title">01 / Business Entity</h3>
        <section class="ui-card">
            <div id="badge_id" class="id-display">NS-NEW-0000</div>
            <label style="font-size:10px; font-weight:800; color:var(--slate); margin-bottom:8px; display:block;">FIRM NAME</label>
            <input type="text" id="firm_name" oninput="updateNSID()" class="field" style="background:#f1f5f9; color:#0f172a; text-align:left;" placeholder="Type business name...">
        </section>

        <h3 class="card-title">02 / Geospatial Data</h3>
        <section class="ui-card">
            <div id="map_box"></div>
            <button class="action-btn" style="background:var(--dark);" onclick="getPrecisionGPS()">📍 Lock Location</button>
            <textarea id="addr_res" style="width:100%; margin-top:15px; padding:18px; border-radius:18px; border:1px solid var(--border); font-size:14px;" placeholder="Address data will appear here..."></textarea>
        </section>

        <h3 class="card-title">03 / Evidence Assets</h3>
        <section class="ui-card">
            <div class="media-scroller" id="media_shelf"></div>
            <input type="file" id="cam_input" accept="image/*" capture="environment" style="display:none;" onchange="handleCam(this)">
            <button class="action-btn" onclick="document.getElementById('cam_input').click()" style="background:var(--blue);">📷 Site Photo</button>
        </section>

        <nav class="nav-dock">
            <button class="dock-btn" style="background:var(--blue);" onclick="saveRecord()">💾 Save</button>
            <button class="dock-btn" style="background:var(--green);" onclick="syncCloud()">🚀 Sync</button>
        </nav>
    </main>

    <script>
        /**
         * NIRMASUTRA ENGINE NSIDBS06 (Extended Version)
         */
        
        // Configuration
        const MASTER_SECRET = "Life4life@nsid";
        let localDB, appMap, userMarker, mediaList = [];

        /**
         * Initialize IndexedDB with versioning logic
         */
        const bootStorage = () => {
            const request = indexedDB.open("NS_INTEL_VAULT", 15);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains("records")) {
                    db.createObjectStore("records", { keyPath: "id", autoIncrement: true });
                }
            };
            request.onsuccess = (e) => {
                localDB = e.target.result;
                updateMetrics();
            };
        };

        /**
         * Security Handlers
         */
        function toggleView(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function checkMaster() {
            const input = document.getElementById('m_key').value.trim();
            if (input === MASTER_SECRET) {
                sessionStorage.setItem('ns_m', 'OK');
                document.getElementById('scr_master').classList.add('hidden');
                document.getElementById('scr_user').classList.remove('hidden');
            } else {
                handleErr('m_key', 'm_msg');
            }
        }

        function checkUser() {
            const id = document.getElementById('u_id').value.trim();
            const pw = document.getElementById('u_key').value.trim();
            const db = { "NSID001": "Life4life@01", "NSID002": "Life4life@02", "NSID003": "Life4life@03" };

            if (db[id] === pw) {
                sessionStorage.setItem('ns_u', id);
                launchDashboard(id);
            } else {
                handleErr('u_key', 'u_msg');
            }
        }

        function launchDashboard(uid) {
            document.getElementById('scr_user').classList.add('hidden');
            document.getElementById('app_shell').style.display = 'block';
            document.getElementById('disp_user').innerText = uid;
            
            setTimeout(() => {
                appMap = L.map('map_box').setView([24.5854, 73.7125], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(appMap);
            }, 300);
        }

        function handleErr(inp, msg) {
            const el = document.getElementById(inp);
            el.classList.add('shake');
            document.getElementById(msg).innerText = "ACCESS DENIED";
            setTimeout(() => {
                el.classList.remove('shake');
                document.getElementById(msg).innerText = "";
            }, 1500);
        }

        /**
         * Feature Logic
         */
        function updateNSID() {
            const name = document.getElementById('firm_name').value;
            const prefix = name.substring(0,3).toUpperCase() || "NEW";
            const rand = Math.floor(1000 + Math.random() * 9000);
            document.getElementById('badge_id').innerText = `NS-${prefix}-${rand}`;
        }

        function getPrecisionGPS() {
            navigator.geolocation.getCurrentPosition(pos => {
                const { latitude, longitude } = pos.coords;
                if(userMarker) appMap.removeLayer(userMarker);
                userMarker = L.marker([latitude, longitude]).addTo(appMap);
                appMap.setView([latitude, longitude], 17);
                document.getElementById('cnt_gps').innerText = "LOCK";
                document.getElementById('cnt_gps').style.color = "var(--green)";
                
                fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`)
                    .then(r => r.json()).then(d => document.getElementById('addr_res').value = d.display_name);
            }, () => alert("Enable GPS"), { enableHighAccuracy: true });
        }

        function handleCam(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                mediaList.push(e.target.result);
                renderMedia();
            };
            reader.readAsDataURL(input.files[0]);
        }

        function renderMedia() {
            const shelf = document.getElementById('media_shelf');
            shelf.innerHTML = mediaList.map(m => `<img src="${m}" class="img-preview">`).join('');
            document.getElementById('cnt_media').innerText = mediaList.length;
        }

        /**
         * Persistence & Lifecycle
         */
        function saveRecord() {
            const store = localDB.transaction("records", "readwrite").objectStore("records");
            store.add({
                firm: document.getElementById('firm_name').value,
                nsid: document.getElementById('badge_id').innerText,
                media: mediaList,
                date: new Date().toISOString()
            });
            alert("RECORD COMMITTED");
            location.reload();
        }

        function syncCloud() { alert("Establishing Cloud Tunnel..."); }
        function logOut() { sessionStorage.clear(); location.reload(); }
        function updateMetrics() {
            const store = localDB.transaction("records", "readonly").objectStore("records");
            const count = store.count();
            count.onsuccess = () => document.getElementById('cnt_local').innerText = count.result;
        }

        window.onload = () => {
            bootStorage();
            if(sessionStorage.getItem('ns_m') && sessionStorage.getItem('ns_u')) {
                document.getElementById('scr_master').classList.add('hidden');
                launchDashboard(sessionStorage.getItem('ns_u'));
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NirmaSutra InfraDepot | Live</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --orange: #ff6a00; --bg: #f1f5f9; --green: #10b981; --dark: #0f172a; --slate: #64748b; --red: #ef4444; --blue: #3b82f6; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #1e293b; }
        .container { max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 15px; padding-bottom: 80px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        h3 { margin: 0 0 12px 0; color: var(--dark); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; border-left: 4px solid var(--orange); padding-left: 8px; }
        label { font-size: 10px; font-weight: 700; color: var(--slate); display: block; margin-bottom: 4px; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; margin-bottom: 10px; box-sizing: border-box; }
        
        /* Password Wrapper */
        .pass-wrapper { position: relative; }
        .toggle-btn { position: absolute; right: 10px; top: 12px; background: none; border: none; font-size: 12px; color: var(--blue); cursor: pointer; font-weight: bold; }
        
        /* Transportation Counters */
        .trans-row { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #e2e8f0; }
        .counter-ctrl { display: flex; align-items: center; gap: 10px; }
        .c-btn { width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--dark); color: white; font-weight: bold; cursor: pointer; }
        .c-val { font-family: monospace; font-weight: bold; width: 20px; text-align: center; }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; color: white; }
        
        #app_root { display: none; }
        #login_zone, #data_entry_zone { display: none; flex-direction: column; gap: 15px; }
        .remember-me { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-bottom: 10px; color: var(--slate); }
        .remember-me input { width: 16px; margin: 0; }
    </style>
</head>
<body>

<div class="container" id="app_root">
    
    <div id="login_zone" class="card">
        <h3>🔑 Secure Login</h3>
        
        <label>Select Staff ID</label>
        <select id="staff_id_input">
            <option value="">-- Choose ID --</option>
            <option value="NSID001">NSID001 (Admin)</option>
            <option value="NSID002">NSID002</option>
            <option value="NSID003">NSID003</option>
            <option value="NSID004">NSID004</option>
            <option value="NSID005">NSID005</option>
        </select>

        <label>Password</label>
        <div class="pass-wrapper">
            <input type="password" id="staff_pass_input" placeholder="••••••">
            <button type="button" class="toggle-btn" onclick="togglePass('staff_pass_input')">SHOW</button>
        </div>

        <div class="remember-me">
            <input type="checkbox" id="remember_check"> <span>Remember Password on this device</span>
        </div>

        <button class="btn" onclick="handleLogin()" style="background: var(--dark);">Login & Unlock</button>
        
        <div style="display: flex; justify-content: space-between; margin-top: 15px;">
            <button onclick="requestReset()" style="background:none; border:none; color:var(--blue); font-size:10px; cursor:pointer; text-decoration:underline;">Forgot Password?</button>
        </div>
    </div>

    <div id="data_entry_zone">
        <div class="card">
            <h3>1. Entity & GPS</h3>
            <label>Firm Name</label><input type="text" id="firm_name" oninput="updateID()">
            <div id="sup_id" style="font-family:monospace; color:var(--orange); font-weight:bold; margin-bottom:10px;">NS-GENERATING</div>
            <div id="map" style="height:150px; border-radius:10px; margin-bottom:10px;"></div>
            <button class="btn" style="background:var(--dark);" onclick="getGPS()">📍 CAPTURE GPS</button>
            <input type="hidden" id="gps_val">
        </div>

        <div class="card">
            <h3>2. Materials</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                <div style="display:flex; align-items:center; gap:5px; background:#f8fafc; padding:8px; border-radius:8px;"><input type="checkbox" id="chk_S" onchange="toggleBox('sand')"> <span>Sand</span></div>
                <div style="display:flex; align-items:center; gap:5px; background:#f8fafc; padding:8px; border-radius:8px;"><input type="checkbox" id="chk_C" onchange="toggleBox('cement')"> <span>Cement</span></div>
                <div style="display:flex; align-items:center; gap:5px; background:#f8fafc; padding:8px; border-radius:8px;"><input type="checkbox" id="chk_B" onchange="toggleBox('bricks')"> <span>Bricks</span></div>
                <div style="display:flex; align-items:center; gap:5px; background:#f8fafc; padding:8px; border-radius:8px;"><input type="checkbox" id="chk_T" onchange="toggleBox('tmt')"> <span>TMT</span></div>
                <div style="display:flex; align-items:center; gap:5px; background:#f8fafc; padding:8px; border-radius:8px;"><input type="checkbox" id="chk_A" onchange="toggleBox('aggregate')"> <span>Aggregate</span></div>
            </div>
            
            <div id="box_sand" class="variety-container"><div id="v_sand" style="display:grid; grid-template-columns:1fr 1fr; gap:5px;"></div></div>
            <div id="box_cement" class="variety-container"><div id="v_cement" style="display:grid; grid-template-columns:1fr 1fr; gap:5px;"></div></div>
            <div id="box_bricks" class="variety-container"><div id="v_bricks" style="display:grid; grid-template-columns:1fr 1fr; gap:5px;"></div></div>
            <div id="box_tmt" class="variety-container"><div id="v_tmt" style="display:grid; grid-template-columns:1fr 1fr; gap:5px;"></div></div>
            <div id="box_aggregate" class="variety-container"><div id="v_aggregate" style="display:grid; grid-template-columns:1fr 1fr; gap:5px;"></div></div>
        </div>

        <div class="card">
            <h3>3. Transportation Fleet</h3>
            <select id="transport_status" onchange="toggleTransport()">
                <option value="No">No Vehicles</option>
                <option value="Yes">Yes (Enter Quantity)</option>
            </select>
            
            <div id="transport_list" style="display:none; margin-top:10px;">
                <div class="trans-row"><span>Tractor</span><div class="counter-ctrl"><button class="c-btn" onclick="adj('v1',-1)">-</button><span class="c-val" id="v1">0</span><button class="c-btn" onclick="adj('v1',1)">+</button></div></div>
                <div class="trans-row"><span>Mini Truck</span><div class="counter-ctrl"><button class="c-btn" onclick="adj('v2',-1)">-</button><span class="c-val" id="v2">0</span><button class="c-btn" onclick="adj('v2',1)">+</button></div></div>
                <div class="trans-row"><span>Mini Dumper</span><div class="counter-ctrl"><button class="c-btn" onclick="adj('v3',-1)">-</button><span class="c-val" id="v3">0</span><button class="c-btn" onclick="adj('v3',1)">+</button></div></div>
                <div class="trans-row"><span>Dumper</span><div class="counter-ctrl"><button class="c-btn" onclick="adj('v4',-1)">-</button><span class="c-val" id="v4">0</span><button class="c-btn" onclick="adj('v4',1)">+</button></div></div>
                <div class="trans-row"><span>Trailor</span><div class="counter-ctrl"><button class="c-btn" onclick="adj('v5',-1)">-</button><span class="c-val" id="v5">0</span><button class="c-btn" onclick="adj('v5',1)">+</button></div></div>
            </div>
        </div>

        <div class="card">
            <button class="btn" id="sub_btn" onclick="saveAndAutoSync()" style="background:var(--green);">💾 SUBMIT & AUTO-SYNC</button>
            <button class="btn" onclick="location.reload()" style="background:var(--slate); margin-top:10px; font-size:12px;">LOGOUT</button>
        </div>
    </div>
</div>

<script>
    const MASTER_KEY = "Life4life@nsid";
    const ADMIN_WA = "91XXXXXXXXXX"; 
    const SCRIPT_URL = "YOUR_GOOGLE_SCRIPT_URL_HERE"; // ⬅️ PLUG YOUR URL HERE

    const DEFAULTS = { "NSID001": "Nirma@001", "NSID002": "Nirma@002", "NSID003": "Nirma@003", "NSID004": "Nirma@004", "NSID005": "Nirma@005" };
    const VARIETIES = {
        sand: ["M-Sand", "P-Sand", "River Sand", "Crushed Sand"],
        cement: ["UltraTech", "Ambuja", "JK Lakshmi", "Wonder"],
        bricks: ["Red Bricks", "AAC Blocks", "Fly Ash"],
        tmt: ["Tata Tiscon", "Jindal", "Kamdhenu"],
        aggregate: ["10mm", "20mm", "40mm"]
    };

    // --- GATEKEEPER & AUTO-LOAD ---
    window.onload = function() {
        // Remembered Credentials
        const savedPass = localStorage.getItem("saved_nirma_pass");
        const savedID = localStorage.getItem("saved_nirma_id");
        if(savedPass && savedID) {
            document.getElementById('staff_id_input').value = savedID;
            document.getElementById('staff_pass_input').value = savedPass;
            document.getElementById('remember_check').checked = true;
        }

        if (sessionStorage.getItem("nirma_gate") !== "true") {
            let a = prompt("🔒 MASTER ACCESS:");
            if (a === MASTER_KEY) { sessionStorage.setItem("nirma_gate", "true"); showApp(); }
            else { window.location.href = "https://google.com"; }
        } else { showApp(); }
    };

    function showApp() { document.getElementById('app_root').style.display = 'block'; document.getElementById('login_zone').style.display = 'flex'; renderVarieties(); }

    function togglePass(id) {
        let x = document.getElementById(id);
        let btn = x.nextElementSibling;
        if (x.type === "password") { x.type = "text"; btn.innerText = "HIDE"; } 
        else { x.type = "password"; btn.innerText = "SHOW"; }
    }

    function handleLogin() {
        const id = document.getElementById('staff_id_input').value;
        const pass = document.getElementById('staff_pass_input').value;
        const remember = document.getElementById('remember_check').checked;
        const stored = localStorage.getItem("pass_" + id) || DEFAULTS[id];

        if (id && pass === stored) {
            if(remember) {
                localStorage.setItem("saved_nirma_id", id);
                localStorage.setItem("saved_nirma_pass", pass);
            } else {
                localStorage.removeItem("saved_nirma_id");
                localStorage.removeItem("saved_nirma_pass");
            }
            document.getElementById('login_zone').style.display = 'none';
            document.getElementById('data_entry_zone').style.display = 'flex';
            updateID(); initMap();
        } else { alert("Invalid Credentials"); }
    }

    function requestReset() {
        const id = document.getElementById('staff_id_input').value;
        if(!id) return alert("Select Staff ID first.");
        window.open(`https://wa.me/${ADMIN_WA}?text=Reset%20${id}`, '_blank');
    }

    // --- FLEET ---
    function adj(id, val) {
        let el = document.getElementById(id);
        let curr = parseInt(el.innerText);
        if (curr + val >= 0) el.innerText = curr + val;
    }

    function toggleTransport() {
        document.getElementById('transport_list').style.display = document.getElementById('transport_status').value === 'Yes' ? 'block' : 'none';
    }

    // --- ENGINE ---
    let map, marker;
    function initMap() { 
        map = L.map('map').setView([24.5854, 73.7125], 13); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); 
    }

    function getGPS() { 
        navigator.geolocation.getCurrentPosition(p => { 
            document.getElementById('gps_val').value = `${p.coords.latitude},${p.coords.longitude}`;
            if(marker) map.removeLayer(marker);
            marker = L.marker([p.coords.latitude, p.coords.longitude]).addTo(map);
            map.setView([p.coords.latitude, p.coords.longitude], 16);
        }); 
    }

    function renderVarieties() {
        Object.keys(VARIETIES).forEach(cat => {
            document.getElementById('v_'+cat).innerHTML = VARIETIES[cat].map(v => 
                `<div style="display:flex; align-items:center; gap:5px; font-size:12px;"><input type="checkbox" class="var-item" value="${v}"> ${v}</div>`
            ).join('');
        });
    }

    function toggleBox(id) {
        const keys = {sand:'S', cement:'C', bricks:'B', tmt:'T', aggregate:'A'};
        document.getElementById('box_'+id).style.display = document.getElementById('chk_'+keys[id]).checked ? 'block' : 'none';
    }

    function updateID() { document.getElementById('sup_id').innerText = "NS-" + Date.now().toString().slice(-6); }

    // --- LIVE SYNC ---
    async function saveAndAutoSync() {
        const btn = document.getElementById('sub_btn');
        btn.disabled = true; btn.innerText = "UPLOADING...";

        const payload = {
            tracking_id: document.getElementById('sup_id').innerText,
            staff: document.getElementById('staff_id_input').value,
            firm: document.getElementById('firm_name').value,
            gps: document.getElementById('gps_val').value,
            fleet: {
                tractor: document.getElementById('v1').innerText,
                mini_truck: document.getElementById('v2').innerText,
                mini_dumper: document.getElementById('v3').innerText,
                dumper: document.getElementById('v4').innerText,
                trailor: document.getElementById('v5').innerText
            },
            timestamp: new Date().toISOString()
        };

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            alert("✅ Synced to NirmaSutra Cloud!");
            location.reload();
        } catch (e) {
            alert("❌ Sync Error. Data not sent.");
            btn.disabled = false; btn.innerText = "💾 RETRY SYNC";
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirmansutra | Enterprise Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hero-gradient { background: radial-gradient(circle at top right, rgba(249, 115, 22, 0.08), transparent); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="hero-gradient min-h-screen flex items-center justify-center p-6">

    <div id="login-card" class="max-w-md w-full glass p-10 md:p-14 rounded-[3rem] text-center shadow-2xl border border-white/5">
        <div class="w-16 h-16 bg-orange-500 rounded-2xl flex items-center justify-center font-black text-slate-950 text-3xl mx-auto mb-8 shadow-lg shadow-orange-500/20">N</div>
        <h1 class="text-3xl font-black text-white mb-2 tracking-tighter italic">Infra<span class="text-orange-500">Depot</span></h1>
        <p id="status-msg" class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em] mb-12 text-center">System Standby</p>
        
        <button id="google-login" class="w-full bg-white text-slate-950 font-black p-5 rounded-2xl flex items-center justify-center gap-4 hover:bg-orange-500 transition-all text-xs uppercase tracking-widest active:scale-95 shadow-xl">
            PROCEED WITH GOOGLE
        </button>

        <div id="error-log" class="mt-8 p-4 bg-rose-500/10 border border-rose-500/20 rounded-xl hidden text-left">
            <p class="text-[9px] font-bold text-rose-500 uppercase mb-1">Diagnostic Report:</p>
            <p id="error-text" class="text-[10px] text-rose-300 font-mono leading-tight"></p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
            authDomain: "infradepo.firebaseapp.com",
            projectId: "infradepo",
            storageBucket: "infradepo.firebasestorage.app",
            messagingSenderId: "733942710671",
            appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        document.getElementById('google-login').onclick = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => showError(err.message));
        };

        auth.onAuthStateChanged(async (user) => {
            const statusMsg = document.getElementById('status-msg');
            if (user) {
                statusMsg.innerText = "AUTHENTICATING...";
                statusMsg.className = "text-[10px] text-orange-500 font-bold uppercase tracking-[0.3em] mb-12";

                try {
                    // ATTEMPT TO FETCH DATA
                    const userRef = db.collection("users").doc(user.uid);
                    const doc = await userRef.get();

                    if (doc.exists) {
                        const data = doc.data();
                        window.location.href = (data.role === 'super_admin' || data.role === 'admin') ? "admin.html" : "capture.html";
                    } else {
                        // BACKUP: SEARCH BY EMAIL
                        const q = await db.collection("users").where("email", "==", user.email).get();
                        if (!q.empty) {
                            window.location.href = (q.docs[0].data().role === 'super_admin') ? "admin.html" : "capture.html";
                        } else {
                            showError("Access Denied: " + user.email + " is not authorized.");
                            setTimeout(() => auth.signOut(), 4000);
                        }
                    }
                } catch (error) {
                    console.error("Deep Error:", error);
                    showError("DB_CONNECTION_FAILURE: " + error.code + " - " + error.message);
                }
            }
        });

        function showError(msg) {
            document.getElementById('error-log').classList.remove('hidden');
            document.getElementById('error-text').innerText = msg;
            document.getElementById('status-msg').innerText = "CONNECTION INTERRUPTED";
            document.getElementById('status-msg').classList.replace('text-orange-500', 'text-rose-500');
        }
    </script>
</body>
</html>

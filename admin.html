<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfraDepot | Admin Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body class="bg-slate-50 flex font-sans">

    <aside class="w-64 bg-slate-900 h-screen sticky top-0 text-slate-300 hidden md:flex flex-col">
        <div class="p-6 text-emerald-500 font-black text-xl border-b border-slate-800">🏗️ InfraDepot</div>
        <nav class="mt-6 flex-1">
            <button onclick="renderDashboard()" class="w-full text-left p-4 hover:bg-slate-800 transition-all">📊 Dashboard</button>
            <button onclick="renderStaff()" class="w-full text-left p-4 hover:bg-slate-800 transition-all">👥 Staff Mgmt</button>
        </nav>
    </aside>

    <main class="flex-1 p-8">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black text-slate-800">Udaipur Market Dashboard</h1>
            <div id="auth-status" class="bg-black text-white px-4 py-1 rounded-full text-[10px] font-mono">Initializing...</div>
        </header>

        <div id="content-area">
            <div class="p-20 text-center text-slate-400 italic">Waiting for Identity Verification...</div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
            authDomain: "infradepo.firebaseapp.com",
            projectId: "infradepo",
            storageBucket: "infradepo.firebasestorage.app",
            messagingSenderId: "733942710671",
            appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const statusEl = document.getElementById('auth-status');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                console.log("Logged in as:", user.uid);
                const userDoc = await getDoc(doc(db, "users", user.uid));
                
                if (userDoc.exists() && userDoc.data().role === 'admin') {
                    statusEl.innerText = "ADMIN ACTIVE: " + (userDoc.data().name || "Vijay");
                    window.renderDashboard();
                } else {
                    statusEl.innerText = "ACCESS DENIED: " + user.uid;
                    alert("Your UID is not an Admin in Firestore: " + user.uid);
                    window.location.href = "login.html";
                }
            } else {
                statusEl.innerText = "NO SESSION FOUND";
                window.location.href = "login.html";
            }
        });

        window.renderDashboard = function() {
            const container = document.getElementById('content-area');
            container.innerHTML = `<div id="admin_map" class="h-96 w-full rounded-2xl shadow-sm border bg-slate-200"></div>`;
            const map = L.map('admin_map').setView([24.5854, 73.7125], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        };

        window.renderStaff = function() {
            document.getElementById('content-area').innerHTML = `<div class="bg-white p-6 rounded-xl border">Staff Management Loaded</div>`;
        };
    </script>
</body>
</html>

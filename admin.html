<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfraDepot | Admin Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .sidebar-item:hover { background: #1e293b; color: white; }
        .active-tab { border-left: 4px solid #10b981; background: #1e293b; color: white; }
    </style>
</head>
<body class="bg-slate-50 flex font-sans">

    <div id="auth-status" class="fixed top-4 right-4 bg-black text-white p-2 px-4 rounded-full text-[10px] z-50 shadow-2xl font-mono border border-slate-700">
        Checking Intelligence...
    </div>

    <aside class="w-64 bg-slate-900 h-screen sticky top-0 text-slate-300 hidden md:flex flex-col">
        <div class="p-6 text-emerald-500 font-black text-xl border-b border-slate-800">🏗️ InfraDepot</div>
        <nav class="mt-6 flex-1">
            <a href="#" onclick="AdminCore.switchTab('dashboard')" class="sidebar-item p-4 flex items-center gap-3 active-tab transition-all">📊 Dashboard</a>
            <a href="#" onclick="AdminCore.switchTab('staff')" class="sidebar-item p-4 flex items-center gap-3 transition-all">👥 Staff Mgmt</a>
            <a href="#" onclick="AdminCore.switchTab('materials')" class="sidebar-item p-4 flex items-center gap-3 transition-all">🧱 Materials</a>
            <a href="#" onclick="AdminCore.switchTab('monitoring')" class="sidebar-item p-4 flex items-center gap-3 transition-all">🗺️ Monitoring</a>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <button onclick="auth.signOut()" class="w-full p-2 text-xs bg-slate-800 hover:bg-rose-900 rounded-lg transition-colors font-bold uppercase tracking-widest">Logout System</button>
        </div>
    </aside>

    <main class="flex-1 p-8">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">Market Intelligence Dashboard</h1>
            <div id="user-badge" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-white px-3 py-1 rounded-full border shadow-sm">Super Admin</div>
        </header>

        <div id="content-area">
            <div class="animate-pulse flex space-y-6 flex-col">
                <div class="grid grid-cols-2 gap-6">
                    <div class="h-32 bg-slate-200 rounded-2xl"></div>
                    <div class="h-32 bg-slate-200 rounded-2xl"></div>
                </div>
                <div class="h-[500px] bg-slate-200 rounded-3xl"></div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="./js/firebase-config.js"></script>
    <script type="module" src="./js/admin-core.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfraDepot | Secure Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full p-10 bg-white rounded-[2.5rem] shadow-2xl">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-slate-900 tracking-tighter uppercase">InfraDepot</h1>
            <p class="text-slate-400 text-[10px] font-bold tracking-widest uppercase mt-2">Udaipur Regional Server</p>
        </div>

        <button id="google-login" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-100 p-4 rounded-2xl font-bold text-slate-700 hover:bg-slate-50 transition-all">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5 h-5">
            Super Admin Login
        </button>

        <div id="debug-box" class="mt-6 p-4 bg-slate-100 rounded-xl text-[10px] font-mono text-slate-500 overflow-hidden">
            System Status: Standing by...
        </div>
    </div>

    <script type="module">
        // 1. IMPORT DIRECTLY
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 2. YOUR EXACT CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
            authDomain: "infradepo.firebaseapp.com",
            projectId: "infradepo",
            storageBucket: "infradepo.firebasestorage.app",
            messagingSenderId: "733942710671",
            appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const log = (msg) => document.getElementById('debug-box').innerText = "LOG: " + msg;

        // 3. THE HANDSHAKE LOGIC
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                log("User Detected: " + user.uid);
                const userDoc = await getDoc(doc(db, "users", user.uid));
                
                if (userDoc.exists()) {
                    if (userDoc.data().role === 'admin') {
                        log("Role: Admin. Redirecting...");
                        window.location.href = "admin.html";
                    } else {
                        log("Role: " + userDoc.data().role + ". Moving to Capture...");
                        window.location.href = "capture.html";
                    }
                } else {
                    log("ERROR: UID " + user.uid + " NOT IN FIRESTORE.");
                    alert("UID NOT REGISTERED: " + user.uid);
                }
            } else {
                log("Ready for Login.");
            }
        });

        document.getElementById('google-login').onclick = async () => {
            const provider = new GoogleAuthProvider();
            try {
                log("Opening Google...");
                await signInWithPopup(auth, provider);
            } catch (e) {
                log("Error: " + e.message);
            }
        };
    </script>
</body>
</html>

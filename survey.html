<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirmansutra | Field Terminal v2.1</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: Arial; background:#f2f4f7; }
        .card { background:#fff; padding:15px; margin:10px; border-radius:12px; }
        .title { font-size:11px; color:#ff7a00; font-weight:bold; margin-bottom:8px; }
        .map { height:180px; border-radius:10px; }

        .mat-row { background:#0f1b2d; color:#fff; padding:12px; border-radius:8px; cursor:pointer; margin-bottom:6px; }
        .variety-box { display:none; padding-left:10px; }
        .brand-box { display:none; padding-left:20px; }

        .counter-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .counter { background:#f4f6f9; padding:10px; border-radius:10px; }
        .counter-inner { display:flex; justify-content:space-between; }

        img { border-radius:6px; }
    </style>
</head>

<body>

<div class="card">
    <div class="title">TRACKING ID</div>
    <div id="trackingIdBox">ID---</div>
</div>

<div class="card">
    <div class="title">ENTITY</div>
    <input id="firmName" placeholder="Firm Name">
    <input id="ownerName" placeholder="Owner Name">
    <input id="ownerPhone" placeholder="Phone">
    <input id="ownerWhatsapp" placeholder="WhatsApp">
</div>

<div class="card">
    <div class="title">GPS</div>
    <div id="map" class="map"></div>
    <button onclick="captureGPS()">📍 Capture GPS</button>
    <input id="coordinates" readonly>
    <textarea id="address"></textarea>

    <input type="file" accept="image/*" capture="environment" onchange="handlePhoto(event)">
    <div id="photoPreview" class="flex gap-2 flex-wrap"></div>
</div>

<div class="card">
    <div class="title">MATERIALS INTELLIGENCE</div>
    <div id="materialsContainer"></div>
</div>

<div class="card">
    <div class="title">TRANSPORTATION FLEET</div>
    <div id="fleetContainer" class="counter-grid"></div>
</div>

<div class="card">
    <button id="syncBtn" onclick="syncCloud()">🚀 SUBMIT</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map, marker;
let photos = [];

// ================= MAP =================
function initMap(){
    map = L.map('map').setView([24.58,73.71],13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

// ================= GPS =================
function captureGPS(){
    navigator.geolocation.getCurrentPosition(async pos=>{
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        document.getElementById("coordinates").value = lat + "," + lng;

        if(marker) map.removeLayer(marker);
        marker = L.marker([lat,lng]).addTo(map);

        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
        const data = await res.json();

        document.getElementById("address").value = data.display_name;
    });
}

// ================= MATERIALS =================
const hierarchy = {
    "Cement": {
        varieties:["OPC 43","OPC 53","PPC"],
        brands:["ACC","UltraTech","Ambuja","Shree","Dalmia","JK","Ramco","Wonder","Binani","Birla"]
    },
    "TMT Steel": {
        varieties:["Fe500","Fe550D","Fe600"],
        brands:["Tata","JSW","Jindal","Kamdhenu","SAIL","Vizag","Rathi","Shyam","Electrosteel","Amba"]
    },
    "Sand": {
        varieties:["River","M-Sand","Plaster"],
        brands:["Local","Premium"]
    },
    "Aggregates": {
        varieties:["10mm","20mm","40mm"],
        brands:["Crusher A","Crusher B"]
    },
    "Masonry Stones": {
        varieties:["Granite","Basalt"],
        brands:["Local Quarry"]
    },
    "Bricks": {
        varieties:["Red","Fly Ash"],
        brands:["Local","Premium"]
    }
};

function initMaterials(){
    const cont = document.getElementById("materialsContainer");

    Object.keys(hierarchy).forEach(mat=>{
        const safe = mat.replace(/\s/g,'');

        const div = document.createElement("div");

        div.innerHTML = `
            <div class="mat-row" onclick="toggleDiv('var_${safe}')">${mat}</div>
            <div id="var_${safe}" class="variety-box">
                ${hierarchy[mat].varieties.map(v=>{
                    const vID = v.replace(/\s/g,'');
                    return `
                    <div>
                        <label onclick="toggleDiv('brand_${vID}')">
                            <input type="checkbox" class="data-var" data-mat="${mat}" value="${v}">
                            ${v}
                        </label>
                        <div id="brand_${vID}" class="brand-box">
                            ${hierarchy[mat].brands.map(b=>`
                                <label>
                                    <input type="checkbox" class="data-brand" data-parent="${v}" data-mat="${mat}" value="${b}">
                                    ${b}
                                </label><br>
                            `).join("")}
                        </div>
                    </div>
                    `;
                }).join("")}
            </div>
        `;

        cont.appendChild(div);
    });
}

// ================= FLEET =================
const fleetTypes = ["Tractor","Mini Truck","Truck","Dumper","Trailer"];

function initFleet(){
    const cont = document.getElementById("fleetContainer");

    fleetTypes.forEach(f=>{
        cont.innerHTML += `
            <div class="counter">
                <div>${f}</div>
                <div class="counter-inner">
                    <button onclick="step('${f}',-1)">-</button>
                    <span id="count_${f}" class="fleet-val" data-name="${f}">0</span>
                    <button onclick="step('${f}',1)">+</button>
                </div>
            </div>
        `;
    });
}

function step(id,v){
    const el = document.getElementById("count_"+id);
    let val = parseInt(el.innerText) + v;
    if(val >= 0) el.innerText = val;
}

// ================= PHOTO =================
function handlePhoto(e){
    if(photos.length >= 10) return alert("Max 10 photos");

    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = ev=>{
        const img = new Image();
        img.src = ev.target.result;

        img.onload = ()=>{
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            const scale = 0.6;
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;

            ctx.drawImage(img,0,0,canvas.width,canvas.height);

            // Stamp
            ctx.fillStyle = "red";
            ctx.font = "16px Arial";
            ctx.fillText(new Date().toLocaleString(),10,canvas.height-20);
            ctx.fillText(document.getElementById("coordinates").value,10,canvas.height-5);

            const base64 = canvas.toDataURL("image/jpeg",0.7);

            photos.push(base64);

            const im = document.createElement("img");
            im.src = base64;
            im.width = 60;
            im.onclick = ()=>window.open(base64);

            document.getElementById("photoPreview").appendChild(im);
        };
    };

    reader.readAsDataURL(file);
}

// ================= HELPERS =================
function toggleDiv(id){
    const el = document.getElementById(id);
    el.style.display = (el.style.display === "block") ? "none" : "block";
}

// ================= INIT =================
window.onload = ()=>{
    initMap();
    initMaterials();
    initFleet();
};
</script>

<script type="module">
import "./js/firebase-config.js";
import "./js/core-engine.js";
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InfraDepot | Market Intelligence</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" href="./assets/icons/icon-512.png">
    <meta name="theme-color" content="#2dd4bf">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./css/style.css">
    
    <style>
        body { margin:0; background:#000; color:#fff; font-family: sans-serif; }
        #auth_layer, #app_layer { display:none; min-height:100vh; }
        .loading-screen { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; background: #000; 
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(45,212,191,0.1);
            border-top-color: #2dd4bf; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader" class="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top:20px; font-size:10px; letter-spacing:2px; opacity:0.5;">INFRA DEPOT BOOTING...</p>
    </div>

    <div id="auth_layer"></div>
    <div id="app_layer"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./js/firebase-config.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/admin.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/map.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/app.js"></script>

    <script>
        // Emergency Failsafe: Hide loader if Firebase fails
        setTimeout(() => {
            if (document.getElementById('loader')) {
                console.log("Failsafe triggered: Check Firebase connection.");
                // We keep the loader or show a specific error
            }
        }, 8000);
    </script>
</body>
</html>

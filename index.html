<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
    <title>InfraDepot | Intelligence</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0e12">

    <link rel="stylesheet" href="css/components.css">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app-check.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        
        // 2026 SECURITY: App Check (Prevents unauthorized API usage)
        self.FIREBASE_APPCHECK_DEBUG_TOKEN = true; // Set to false in production
        initializeAppCheck(app, {
            provider: new ReCaptchaV3Provider('YOUR_RECAPTCHA_KEY'),
            isTokenAutoRefreshEnabled: true
        });

        window.db = getFirestore(app);
        window.auth = getAuth(app);
    </script>

    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/map.js"></script>
    <script src="js/app.js"></script>
</head>
<body style="background: #0a0e12; overflow-x: hidden;">
    <div id="auth_layer"></div>
    <div id="app_layer" style="display:none;"></div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfraDepot | HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>#map { height: 600px; width: 100%; z-index: 1; border-radius: 2rem; }</style>
</head>
<body class="bg-slate-950 text-slate-100 flex min-h-screen">

    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col p-6 sticky top-0 h-screen">
        <div class="mb-10">
            <h1 class="text-xl font-black text-emerald-400">INFRADEPOT</h1>
            <p class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.2em]">Regional HQ</p>
        </div>
        
        <nav class="space-y-2 flex-1">
            <button onclick="window.location.reload()" class="w-full text-left p-4 rounded-2xl bg-emerald-500/10 text-emerald-400 font-bold border border-emerald-500/20">📍 Intel Map</button>
            <div class="p-4 text-slate-600 text-[10px] font-bold uppercase tracking-widest">Tools Coming Soon...</div>
        </nav>

        <div class="pt-6 border-t border-slate-800">
            <div id="user-display" class="text-xs font-bold text-slate-400 truncate">Checking...</div>
        </div>
    </aside>

    <main class="flex-1 p-8">
        <div class="bg-slate-900 rounded-[3rem] p-4 border border-slate-800 shadow-2xl relative">
            <div id="map"></div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
            authDomain: "infradepo.firebaseapp.com",
            projectId: "infradepo",
            storageBucket: "infradepo.firebasestorage.app",
            messagingSenderId: "733942710671",
            appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const map = L.map('map').setView([24.5854, 73.7125], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-display').innerText = "ADMIN: " + user.email;
                loadPins();
            } else {
                window.location.href = "index.html";
            }
        });

        function loadPins() {
            onSnapshot(collection(db, "surveys"), (snap) => {
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.location) {
                        L.marker([d.location.lat, d.location.lng]).addTo(map)
                            .bindPopup(`<b>${d.firmName}</b><br>${d.brand}`);
                    }
                });
            });
        }
    </script>
</body>
</html>

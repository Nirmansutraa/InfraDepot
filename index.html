<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirmansutra | Enterprise Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; scroll-behavior: smooth; }
        .infra { color: #94a3b8; } .depot { color: #f97316; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hero-gradient { background: radial-gradient(circle at top right, rgba(249, 115, 22, 0.08), transparent); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="text-slate-300 antialiased selection:bg-orange-500/30 hero-gradient min-h-screen">

    <nav class="fixed top-0 w-full z-50 glass border-b border-white/5">
        <div class="max-w-7xl mx-auto px-8 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-emerald-500 rounded-lg flex items-center justify-center font-black text-slate-950 shadow-lg">N</div>
                <span class="text-xl font-extrabold tracking-tighter text-white uppercase">Nirmansutra</span>
            </div>
            <div class="hidden md:flex gap-8 text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">
                <a href="#about" class="hover:text-orange-500 transition-colors">About</a>
                <a href="#ecosystem" class="hover:text-orange-500 transition-colors">Ecosystem</a>
                <a href="#contact" class="hover:text-orange-500 transition-colors">Connect</a>
            </div>
            <button onclick="openAuth()" class="bg-white text-slate-950 px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-orange-500 transition-all">Portal Login</button>
        </div>
    </nav>

    <section class="pt-40 pb-20 px-8">
        <div class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-16 items-center">
            <div class="space-y-8 text-center lg:text-left">
                <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-orange-500/10 border border-orange-500/20 text-orange-500 text-[9px] font-black uppercase tracking-widest mx-auto lg:mx-0">
                    The Udaipur Infrastructure Standard
                </div>
                <h1 class="text-6xl md:text-8xl font-black text-white leading-[0.9] tracking-tighter">
                    Building <br>Intelligence <br><span class="infra">Infra</span><span class="depot">Segment.</span>
                </h1>
                <p class="text-lg text-slate-400 max-w-md leading-relaxed mx-auto lg:mx-0">
                    Nirmansutra is the unified digital backbone for modern infrastructure development.
                </p>
                <div class="flex justify-center lg:justify-start gap-4">
                    <button onclick="openAuth()" class="bg-slate-800 text-white px-8 py-4 rounded-2xl font-bold text-sm hover:bg-slate-700 transition-all">Access Dashboard</button>
                </div>
            </div>
        </div>
    </section>

    <div id="auth-modal" class="fixed inset-0 bg-slate-950/95 backdrop-blur-2xl z-[100] hidden flex items-center justify-center p-6">
        <div id="login-card" class="max-w-md w-full glass p-10 md:p-14 rounded-[4rem] text-center relative border-orange-500/20 shadow-2xl">
            <h3 class="text-3xl font-black text-white mb-2 tracking-tighter italic"><span class="infra">Infra</span><span class="depot">Depot</span> Terminal</h3>
            <p id="auth-msg" class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.3em] mb-12">Authorized Access Only</p>
            
            <button id="google-login" class="w-full bg-white text-slate-950 font-black p-5 rounded-2xl flex items-center justify-center gap-4 hover:bg-orange-500 transition-all text-xs uppercase tracking-widest shadow-xl">
                PROCEED WITH GOOGLE
            </button>
            <button onclick="closeAuth()" class="mt-8 text-[10px] text-slate-600 font-black uppercase tracking-widest hover:text-rose-500 transition-colors">Abort Connection</button>
        </div>

        <div id="setup-gate" class="max-w-md w-full glass p-10 md:p-14 rounded-[4rem] text-center hidden border-emerald-500/20">
            <h3 class="text-2xl font-black text-emerald-400 mb-2 tracking-tighter uppercase italic">Identity Setup</h3>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-10 text-center">First Login: Activate your Field ID</p>
            <div class="space-y-4">
                <input type="tel" id="setup-whatsapp" placeholder="WhatsApp Number" class="w-full p-4 rounded-xl bg-slate-900 border border-white/10 outline-none text-sm text-white">
                <button onclick="finalizeProfile()" class="w-full bg-emerald-500 text-slate-950 font-black py-4 rounded-xl text-xs uppercase tracking-widest">Verify & Activate</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
            authDomain: "infradepo.firebaseapp.com",
            projectId: "infradepo",
            storageBucket: "infradepo.firebasestorage.app",
            messagingSenderId: "733942710671",
            appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        window.openAuth = () => document.getElementById('auth-modal').classList.remove('hidden');
        window.closeAuth = () => document.getElementById('auth-modal').classList.add('hidden');

        document.getElementById('google-login').onclick = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        };

        auth.onAuthStateChanged(async (user) => {
            const authMsg = document.getElementById('auth-msg');
            const loginCard = document.getElementById('login-card');
            
            if (user) {
                openAuth();
                authMsg.innerText = "Verifying Identity...";
                authMsg.classList.replace('text-slate-500', 'text-orange-500');

                try {
                    // Force the database to refresh the check
                    const userRef = db.collection("users").doc(user.uid.trim());
                    const doc = await userRef.get();

                    if (doc.exists) {
                        const userData = doc.data();
                        if (userData.mustCompleteProfile === true) {
                            loginCard.classList.add('hidden');
                            document.getElementById('setup-gate').classList.remove('hidden');
                        } else {
                            window.location.href = (userData.role === 'super_admin' || userData.role === 'admin') ? "admin.html" : "capture.html";
                        }
                    } else {
                        // Fallback check by email
                        const q = await db.collection("users").where("email", "==", user.email).get();
                        if (!q.empty) {
                            const d = q.docs[0].data();
                            window.location.href = (d.role === 'super_admin') ? "admin.html" : "capture.html";
                        } else {
                            authMsg.innerText = "ACCESS DENIED: " + user.email;
                            authMsg.classList.replace('text-orange-500', 'text-rose-500');
                            setTimeout(() => auth.signOut(), 3000);
                        }
                    }
                } catch (error) {
                    console.error("DB Error:", error);
                    authMsg.innerText = "DB CONNECTION ERROR. REFRESHING...";
                    // Auto-retry once after 2 seconds
                    setTimeout(() => location.reload(), 2000);
                }
            }
        });

        async function finalizeProfile() {
            const wa = document.getElementById('setup-whatsapp').value;
            if(!wa || wa.length < 10) return alert("Valid WhatsApp required.");
            await db.collection("users").doc(auth.currentUser.uid).update({
                whatsapp: wa,
                mustCompleteProfile: false,
                activatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            location.reload();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>InfraDepot</title>

<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b1b33;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
text-align:center;
}

.logo{
font-size:42px;
font-weight:700;
letter-spacing:2px;
margin-bottom:10px;
}

.subtitle{
opacity:0.7;
font-size:14px;
margin-bottom:30px;
}

.loader{
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
INFRADEPOT
</div>

<div class="subtitle">
Construction Supply Intelligence Engine
</div>

<div class="loader">
Loading system...
</div>

</div>


<script>

function routeUser(){

const session = localStorage.getItem("infraDepotUser");

if(session){

window.location.href="capture.html";

}else{

window.location.href="login.html";

}

}

setTimeout(routeUser,1200);

</script>


<script>

if('serviceWorker' in navigator){

navigator.serviceWorker.register('sw.js')
.then(function(reg){

console.log("Service Worker Registered");

}).catch(function(err){

console.log("Service Worker Failed",err);

});

}

</script>


</body>
</html>

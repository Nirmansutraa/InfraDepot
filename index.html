<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nirmansutra InfraDepot | Secure Intel</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff6a00">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otplib/12.0.1/otplib-browser.js"></script>

    <style>
        :root { --orange: #ff6a00; --bg: #f1f5f9; --green: #10b981; --dark: #0f172a; --slate: #64748b; --red: #ef4444; --blue: #3b82f6; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #1e293b; }
        .container { max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 15px; padding-bottom: 80px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        h3 { margin: 0 0 12px 0; color: var(--dark); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; border-left: 4px solid var(--orange); padding-left: 8px; }
        label { font-size: 10px; font-weight: 700; color: var(--slate); display: block; margin-bottom: 4px; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; margin-bottom: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-save { background: var(--green); color: white; }
        .btn-sync { background: var(--blue); color: white; }
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.9); z-index: 10000; color: white; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--orange); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .id-box { background: #0f172a; color: #22c55e; font-family: monospace; font-size: 20px; text-align: center; padding: 15px; border-radius: 8px; font-weight: bold; }
        
        /* 🔐 Lock State CSS */
        #app_root { display: none; }
        #data_entry_zone { display: none; flex-direction: column; gap: 15px; }
        .dash-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .stat-card { background: var(--dark); color: white; padding: 10px; border-radius: 8px; text-align: center; }
        .stat-card b { font-size: 16px; color: var(--orange); }
        .full-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .variety-container { display: none; background: #fffcf0; padding: 12px; border: 1px dashed var(--orange); border-radius: 8px; }
        .check-pill { display: flex; align-items: center; background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .check-pill input { width: 18px; height: 18px; margin-right: 8px; }
        .thumb { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 6px; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p>Processing...</p></div>

<div class="container" id="app_root">
    
    <div class="card" style="border: 2px solid var(--blue);">
        <h3>🔑 Staff Identity Verification</h3>
        <div id="auth_inputs">
            <label>Staff ID</label>
            <input type="text" id="staff_id_input" placeholder="NSID001">
            <label>6-Digit Authenticator Code</label>
            <input type="number" id="otp_input" placeholder="000000" pattern="\d*">
            <button class="btn" id="verify_btn" onclick="validateTOTP()" style="background: var(--dark); color: white;">Verify & Unlock Form</button>
        </div>
        <p id="auth_msg" style="font-size: 11px; color: var(--slate); font-weight: bold; margin-top: 10px; text-align: center;">Form is currently locked.</p>
    </div>

    <div class="card">
        <h3>1. Tracking ID</h3>
        <div id="sup_id" class="id-box">ID-GENERATING</div>
    </div>

    <div id="data_entry_zone">
        
        <div class="card">
            <h3>📊 Intelligence Dashboard</h3>
            <div class="dash-grid">
                <div class="stat-card"><small>Total</small><b id="count_all">0</b></div>
                <div class="stat-card"><small>Sand</small><b id="count_S">0</b></div>
                <div class="stat-card"><small>Cement</small><b id="count_C">0</b></div>
            </div>
        </div>

        <div class="card">
            <h3>2. Entity Information</h3>
            <label>Firm Name</label><input type="text" id="firm_name" oninput="updateID()">
            <label>Owner Name</label><input type="text" id="owner_name">
            <label>Address</label><textarea id="address"></textarea>
            <div class="full-grid">
                <div><label>Phone</label><input type="tel" id="phone" oninput="autoWA()"></div>
                <div><label>WhatsApp</label><input type="tel" id="whatsapp"></div>
            </div>
        </div>

        <div class="card">
            <h3>3. GPS & Media</h3>
            <div id="map" style="height:180px; border-radius:10px; margin-bottom:10px;"></div>
            <button class="btn" style="background:var(--dark); color:white; margin-bottom:10px;" onclick="getGPS()">📍 CAPTURE GPS</button>
            <input type="text" id="gps_val" readonly placeholder="Coordinates">
            <input type="file" id="img_in" accept="image/*" capture="environment" multiple hidden onchange="handlePhotos(this)">
            <div style="border:2px dashed var(--slate); padding:20px; text-align:center; border-radius:10px; cursor:pointer;" onclick="document.getElementById('img_in').click()">📸 TAP TO CAPTURE PHOTOS</div>
            <div id="preview_zone" style="display:grid; grid-template-columns:repeat(4,1fr); gap:5px; margin-top:10px;"></div>
        </div>

        <div class="card">
            <h3>4. Materials</h3>
            <div class="full-grid">
                <div class="check-pill"><input type="checkbox" id="chk_S" onchange="toggleBox('sand')"><span>Sand</span></div>
                <div class="check-pill"><input type="checkbox" id="chk_C" onchange="toggleBox('cement')"><span>Cement</span></div>
            </div>
            <div id="box_sand" class="variety-container"><div id="v_sand" class="full-grid"></div></div>
            <div id="box_cement" class="variety-container"><div id="v_cement" class="full-grid"></div></div>
        </div>

        <div class="card">
            <h3>5. Operations</h3>
            <button class="btn btn-save" id="save_btn" onclick="saveSupplier()">💾 SAVE LOCALLY</button>
            <button class="btn btn-sync" id="sync_btn" onclick="syncMasterToDrive()" style="margin-top:10px;">🚀 SYNC TO CLOUD</button>
            <button class="btn" style="background:#e2e8f0; margin-top:10px;" onclick="location.reload()">➕ NEW ENTRY</button>
        </div>

        <div class="card">
            <h3>6. Local History</h3>
            <div id="history_list" style="max-height:150px; overflow-y:auto; font-size:12px;"></div>
        </div>
    </div>
</div>

<script>
    // --- 🔐 SECURITY CONFIG ---
    const MASTER_KEY = "Life4life@nsid";
    const STAFF_SECRETS = {
        "NSID001": "NIRM4SUTR4ST4FFB",
        "NSID002": "NIRM4SUTR4ST4FFC",
        "NSID003": "NIRM4SUTR4ST4FFD",
        "NSID004": "NIRM4SUTR4ST4FFE",
        "NSID005": "NIRM4SUTR4ST4FFF"
    };

    // --- 🛡️ TIER 1: MASTER ACCESS ---
    window.onload = function() {
        if (sessionStorage.getItem("nirma_gate") !== "true") {
            let attempt = prompt("🔒 NIRMANSUTRA SECURE ACCESS:");
            if (attempt === MASTER_KEY) {
                sessionStorage.setItem("nirma_gate", "true");
                document.getElementById('app_root').style.display = 'flex';
                initDB();
            } else {
                alert("Unauthorized.");
                window.location.href = "https://google.com";
            }
        } else {
            document.getElementById('app_root').style.display = 'flex';
            initDB();
        }
    };

    // --- 🛡️ TIER 2: STAFF TOTP VERIFICATION ---
    function validateTOTP() {
        const id = document.getElementById('staff_id_input').value.toUpperCase().trim();
        const token = document.getElementById('otp_input').value.trim();
        const msg = document.getElementById('auth_msg');
        const vBtn = document.getElementById('verify_btn');
        const entryZone = document.getElementById('data_entry_zone');

        if (!STAFF_SECRETS[id]) {
            msg.innerText = "❌ Unknown Staff ID";
            msg.style.color = "var(--red)";
            return;
        }

        try {
            // window: 3 allows for ±90 seconds time drift
            const isValid = otplib.authenticator.check(token, STAFF_SECRETS[id], { window: 3 });

            if (isValid) {
                entryZone.style.display = 'flex';
                document.getElementById('auth_inputs').style.display = 'none';
                vBtn.disabled = true;
                msg.innerText = "✅ IDENTITY VERIFIED: Welcome " + id;
                msg.style.color = "var(--green)";
                initApp(); 
            } else {
                msg.innerText = "❌ Invalid or Expired Code. Try Again.";
                msg.style.color = "var(--red)";
                entryZone.style.display = 'none';
            }
        } catch (err) { console.error(err); }
    }

    // --- ⚙️ BASE ENGINE (RETAINED) ---
    let db, map, marker;
    function initDB() {
        const request = indexedDB.open("InfraDepotDB", 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("suppliers")) db.createObjectStore("suppliers", { keyPath: "supplier_id" });
        };
        request.onsuccess = e => { db = e.target.result; loadFromDB(); };
    }

    function initApp() {
        if(!map) {
            map = L.map('map').setView([24.5854, 73.7125], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }
        updateID();
        // Variety loaders here...
    }

    function updateID() { document.getElementById('sup_id').innerText = "NS-" + Date.now().toString().slice(-6); }
    function autoWA() { document.getElementById('whatsapp').value = document.getElementById('phone').value; }
    function toggleBox(id) { document.getElementById('box_'+id).style.display = document.getElementById('chk_'+id.charAt(0).toUpperCase()).checked ? 'block' : 'none'; }
    
    function getGPS() { 
        navigator.geolocation.getCurrentPosition(p => { 
            const coords = `${p.coords.latitude.toFixed(6)}, ${p.coords.longitude.toFixed(6)}`;
            document.getElementById('gps_val').value = coords;
            if(marker) map.removeLayer(marker);
            marker = L.marker([p.coords.latitude, p.coords.longitude]).addTo(map);
            map.setView([p.coords.latitude, p.coords.longitude], 16);
        }); 
    }

    function loadFromDB() {
        if(!db) return;
        const tx = db.transaction("suppliers", "readonly");
        tx.objectStore("suppliers").getAll().onsuccess = e => {
            const data = e.target.result;
            document.getElementById('count_all').innerText = data.length;
            document.getElementById('history_list').innerHTML = data.reverse().map(s => `<div><b>${s.firm_name}</b> - ${s.timestamp}</div>`).join('');
        };
    }

    function saveSupplier() {
        const firm = document.getElementById('firm_name').value;
        if(!firm) return alert("Firm Name Required");
        document.getElementById('loader').style.display = 'flex';
        const record = {
            supplier_id: document.getElementById('sup_id').innerText,
            staff_id: document.getElementById('staff_id_input').value.toUpperCase(),
            firm_name: firm,
            gps: document.getElementById('gps_val').value,
            timestamp: new Date().toLocaleString()
        };
        const tx = db.transaction("suppliers", "readwrite");
        tx.objectStore("suppliers").put(record);
        tx.oncomplete = () => {
            loadFromDB();
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; alert("Saved!"); }, 500);
        };
    }
</script>
</body>
</html>

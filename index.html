<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirmansutra | Construction Supply Chain Intelligence</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; color: #1a202c; }
        .hero-bg { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
            url('https://images.unsplash.com/photo-1541888946425-d81bb19240f5?q=80&w=2070'); 
            background-size: cover; background-position: center;
        }
        .btn-orange { background-color: #FF5A00; color: white; transition: 0.3s; }
        #loader { position: fixed; inset: 0; background: white; z-index: 1000; display: none; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="loader">
        <div class="w-12 h-12 border-4 border-gray-200 border-t-[#FF5A00] rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Verifying Access...</p>
    </div>

    <nav class="fixed top-0 w-full z-50 bg-white shadow-sm border-b h-20 flex justify-between items-center px-8">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-[#FF5A00] rounded flex items-center justify-center font-black text-white">N</div>
            <span class="text-2xl font-black text-[#0B1B33]">NIRMANSUTRA</span>
        </div>
        <button onclick="login()" class="btn-orange px-8 py-2.5 rounded font-bold uppercase text-[10px] tracking-widest shadow-lg shadow-orange-500/20">Partner Login</button>
    </nav>

    <section class="hero-bg min-h-screen flex items-center px-8">
        <div class="max-w-4xl text-white space-y-6">
            <div class="inline-block px-4 py-1 rounded bg-[#FF5A00] text-[10px] font-black uppercase tracking-widest">Rajasthan Hub</div>
            <h1 class="text-6xl md:text-8xl font-900 tracking-tighter leading-none italic">DIGITIZING <br>INFRASTRUCTURE.</h1>
            <p class="text-xl font-light max-w-xl text-gray-200">The unified tech-platform for construction material procurement and supplier mapping.</p>
            <button onclick="login()" class="btn-orange px-12 py-5 rounded font-black uppercase text-sm tracking-widest active:scale-95 transition-all shadow-2xl">Access Terminal</button>
        </div>
    </section>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
            authDomain: "infradepo.firebaseapp.com",
            projectId: "infradepo",
            storageBucket: "infradepo.firebasestorage.app",
            messagingSenderId: "733942710671",
            appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function login() {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                document.getElementById('loader').style.display = 'flex';
                const doc = await db.collection("users").doc(user.uid).get();
                if (doc.exists) {
                    const role = doc.data().role;
                    window.location.href = (role === 'admin' || role === 'super_admin') ? "admin.html" : "survey.html";
                } else {
                    alert("Account not whitelisted. Contact Vijay.");
                    auth.signOut();
                    location.reload();
                }
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NirmaSutra InfraDepot | Enterprise v3.0</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --orange: #ff6a00; --bg: #f1f5f9; --green: #10b981; --dark: #0f172a; --slate: #64748b; --red: #ef4444; --blue: #3b82f6; --gold: #ffd700; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #1e293b; }
        .container { max-width: 600px; margin: auto; display: flex; flex-direction: column; gap: 15px; padding-bottom: 80px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        h3 { margin: 0 0 12px 0; color: var(--dark); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; border-left: 4px solid var(--orange); padding-left: 8px; }
        label { font-size: 10px; font-weight: 700; color: var(--slate); display: block; margin-bottom: 4px; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; margin-bottom: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; color: white; transition: 0.3s; }
        
        #app_root, #login_zone, #data_entry_zone, #admin_zone { display: none; flex-direction: column; gap: 15px; }
        .dash-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .stat-card { background: var(--dark); color: white; padding: 8px; border-radius: 8px; text-align: center; font-size: 10px; }
        .stat-card b { font-size: 14px; color: var(--orange); }
        
        /* Area Grid - 50 Items Scrollable */
        .area-scroll { height: 250px; overflow-y: auto; border: 1px solid #eee; padding: 10px; border-radius: 8px; background: #fafafa; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .check-pill { display: flex; align-items: center; background: white; padding: 8px; border-radius: 6px; border: 1px solid #e2e8f0; font-size: 11px; }
        .check-pill input { width: 16px; height: 16px; margin-right: 8px; margin-bottom: 0; }
        
        .action-bar { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; position: fixed; bottom: 0; left: 0; right: 0; padding: 15px; background: white; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 1000; }
        .sync-indicator { font-size: 9px; color: var(--green); text-align: center; margin-bottom: 5px; font-weight: bold; }
        
        /* Admin Specific */
        .admin-tab { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; }
        .tab-btn { padding: 8px 15px; background: #e2e8f0; border: none; border-radius: 20px; font-size: 10px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: var(--orange); color: white; }
    </style>
</head>
<body>

<div class="container" id="app_root">
    
    <div id="login_zone" class="card">
        <h3>🔑 Authentication Portal</h3>
        <select id="staff_id_input">
            <option value="">-- Choose Profile --</option>
            <option value="ADMIN">MASTER ADMIN</option>
            <option value="NSID001">NSID001</option>
            <option value="NSID002">NSID002</option>
            <option value="NSID003">NSID003</option>
            <option value="NSID004">NSID004</option>
            <option value="NSID005">NSID005</option>
        </select>
        <input type="password" id="staff_pass_input" placeholder="Password">
        <button class="btn" onclick="handleLogin()" style="background: var(--dark);">ACCESS SYSTEM</button>
    </div>

    <div id="data_entry_zone">
        <div class="sync-indicator" id="auto_save_text">● System Ready</div>
        <div class="card">
            <div class="dash-grid">
                <div class="stat-card"><small>Entries</small><br><b id="count_all">0</b></div>
                <div class="stat-card"><small>GPS</small><br><b id="count_gps">No</b></div>
                <div class="stat-card"><small>Draft</small><br><b id="draft_status">Saved</b></div>
                <div class="stat-card" style="background:var(--blue);"><small>Session</small><br><b id="user_display">--</b></div>
            </div>
        </div>

        <div class="card">
            <h3>1. Supply Area (Udaipur 20km Radius)</h3>
            <div class="check-pill" style="margin-bottom:10px; background:var(--dark); color:white; width:100%;">
                <input type="checkbox" id="area_udaipur" onchange="toggleWholeUdaipur()"> <span>SELECT WHOLE UDAIPUR NETWORK</span>
            </div>
            <div class="area-scroll" id="area_grid">
                </div>
        </div>

        <div class="card">
            <h3>2. Business Intelligence</h3>
            <div id="sup_id" style="background:#0f172a; color:#22c55e; font-family:monospace; font-size:18px; text-align:center; padding:10px; border-radius:8px; margin-bottom:10px;">NS-ID-AUTO</div>
            <label>Verification</label>
            <select id="ver_status">
                <option value="Not Verified">🔴 Not Verified</option>
                <option value="Field Visit Verified">🟠 Field Visit Verified</option>
                <option value="Digitally Verified">🟢 Digitally Verified</option>
            </select>
            <label>Firm & Owner</label>
            <input type="text" id="firm_name" placeholder="Firm Name" oninput="updateID()">
            <input type="text" id="owner_name" placeholder="Owner Name">
            <div class="full-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <input type="tel" id="phone" placeholder="Primary Phone" oninput="autoWA('phone','whatsapp')">
                <input type="tel" id="whatsapp" placeholder="WhatsApp">
            </div>
        </div>

        <div class="card">
            <h3>3. Precise Location</h3>
            <div id="map" style="height:140px; border-radius:10px; margin-bottom:10px;"></div>
            <button class="btn" style="background:var(--dark); font-size:11px;" onclick="getGPS()">📍 LOCK GPS & FETCH ADDRESS</button>
            <input type="hidden" id="gps_val">
            <textarea id="address" rows="2" placeholder="Full Business Address..."></textarea>
        </div>

        <div class="card">
            <h3>4. Materials & Fleet</h3>
            <div class="full-grid" id="mat_checks" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;"></div>
            <div class="trans-row" style="margin-top:10px; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0;">
                <span style="font-size: 13px;">Tractor Fleet</span>
                <div class="counter-ctrl" style="display: flex; align-items: center; gap: 10px;">
                    <button class="c-btn" onclick="adj('v1',-1)" style="width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--dark); color: white;">-</button>
                    <span class="c-val" id="v1" style="font-family: monospace; font-weight: bold; width: 20px; text-align: center;">0</span>
                    <button class="c-btn" onclick="adj('v1',1)" style="width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--dark); color: white;">+</button>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn" onclick="saveAndReset()" style="background:var(--green);">SUBMIT & NEW</button>
            <button class="btn" onclick="location.reload()" style="background:var(--red);">LOGOUT</button>
        </div>
    </div>

    <div id="admin_zone">
        <div class="card" style="background:var(--dark); color:white;">
            <h3>👑 InfraDepot Command Center</h3>
            <div class="admin-tab">
                <button class="tab-btn active" onclick="switchTab('logs')">Submission Logs</button>
                <button class="tab-btn" onclick="switchTab('analytics')">B2B Analytics</button>
                <button class="tab-btn" onclick="switchTab('staff')">Staff Perf</button>
                <button class="tab-btn" onclick="switchTab('export')">Data Export</button>
            </div>
        </div>
        <div id="admin_content" class="card"></div>
    </div>
</div>

<script>
    // ----- PROJECT CONFIGURATION -----
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyi81jA2H036vY-f-nSj4P44PzE0eE-yW72tT3o_KogC7GIdzE6X6_hRshqVvG5V15N/exec";
    const MASTER_KEY = "Life4life@nsid";
    const DEFAULTS = { "ADMIN": "Admin@NS2026", "NSID001": "Nirma@001", "NSID002": "Nirma@002", "NSID003": "Nirma@003", "NSID004": "Nirma@004", "NSID005": "Nirma@005" };
    
    const UDAIPUR_AREAS = [
        "Hiran Magri Sec 3", "Hiran Magri Sec 4", "Hiran Magri Sec 5", "Hiran Magri Sec 11", "Hiran Magri Sec 13", "Hiran Magri Sec 14",
        "Gordhan Vilas", "Balicha", "Eklingpura", "Pratap Nagar", "Transport Nagar", "Sukher", "Amberi", "Bhuwana", "Sobhagpura",
        "Fatehpura", "Panchwati", "Saheliyon ki Bari", "Mulla Talai", "Rampura", "Sajjangarh Area", "Ambamata", "Clock Tower",
        "Surajpole", "Delhi Gate", "Udiapole", "Shastri Circle", "Ashwini Bazaar", "Rada Ji Bawri", "Savina", "Titaradi",
        "Jhamarkotra Road", "Bedwas", "Debari", "Kherwara Road", "Madri Ind. Area", "Gudli", "Kaladwas", "Kavita", "Lakhawali",
        "Badi", "Loyra", "Zinc Smelter", "Thoor", "Kailashpuri", "Rama", "Nagda", "Iswal", "Kaya", "Umarda"
    ];

    let db, map, marker;

    // --- INITIALIZATION ---
    window.onload = () => {
        if (sessionStorage.getItem("nirma_gate") !== "true") {
            let a = prompt("🔒 MASTER ACCESS:");
            if (a === MASTER_KEY) { 
                sessionStorage.setItem("nirma_gate", "true"); 
                setupApp(); 
            } else { window.location.href = "https://google.com"; }
        } else { setupApp(); }
    };

    function setupApp() {
        document.getElementById('app_root').style.display = 'block';
        renderAreas();
        initDB();
        startAutoSave();
    }

    function renderAreas() {
        const grid = document.getElementById('area_grid');
        grid.innerHTML = UDAIPUR_AREAS.map(a => `
            <div class="check-pill"><input type="checkbox" class="area-item" value="${a}"><span>${a}</span></div>
        `).join('');
    }

    function initDB() {
        const req = indexedDB.open("InfraDepot_V3", 1);
        req.onupgradeneeded = e => { e.target.result.createObjectStore("records", { keyPath: "id" }); };
        req.onsuccess = e => { db = e.target.result; updateCount(); };
    }

    // --- LOGIN & ACCESS ---
    function handleLogin() {
        const id = document.getElementById('staff_id_input').value;
        const pass = document.getElementById('staff_pass_input').value;
        if (id && pass === DEFAULTS[id]) {
            document.getElementById('login_zone').style.display = 'none';
            document.getElementById('user_display').innerText = id;
            if (id === "ADMIN") {
                document.getElementById('admin_zone').style.display = 'flex';
                switchTab('logs');
            } else {
                document.getElementById('data_entry_zone').style.display = 'flex';
                initMap();
                updateID();
            }
        } else { alert("Wrong Credentials"); }
    }

    // --- AUTO-SAVE LOGIC ---
    function startAutoSave() {
        setInterval(() => {
            const firm = document.getElementById('firm_name').value;
            if (firm) {
                localStorage.setItem("NS_DRAFT", JSON.stringify(getCurrentData()));
                document.getElementById('auto_save_text').innerText = "● Auto-Saved: " + new Date().toLocaleTimeString();
                document.getElementById('draft_status').innerText = "YES";
            }
        }, 10000);
    }

    function getCurrentData() {
        const selectedAreas = Array.from(document.querySelectorAll('.area-item:checked')).map(i => i.value).join(", ");
        return {
            id: document.getElementById('sup_id').innerText,
            staff: document.getElementById('staff_id_input').value,
            firm: document.getElementById('firm_name').value,
            owner: document.getElementById('owner_name').value,
            whatsapp: document.getElementById('whatsapp').value,
            address: document.getElementById('address').value,
            gps: document.getElementById('gps_val').value,
            areas: selectedAreas,
            status: document.getElementById('ver_status').value,
            fleet: document.getElementById('v1').innerText,
            timestamp: new Date().toISOString()
        };
    }

    // --- SUBMIT & RESET ---
    async function saveAndReset() {
        const data = getCurrentData();
        if(!data.firm) return alert("Firm Name Required");
        
        document.getElementById('auto_save_text').innerText = "● SYNCING TO CLOUD...";
        
        try {
            const tx = db.transaction("records", "readwrite");
            tx.objectStore("records").put(data);

            let fd = new URLSearchParams();
            for (let k in data) fd.append(k, data[k]);
            
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: fd });
            alert("✅ Submitted Successfully");
            resetScreen();
            updateCount();
        } catch (e) {
            alert("⚠️ Offline: Saved to Device");
            resetScreen();
        }
    }

    function resetScreen() {
        document.getElementById('firm_name').value = "";
        document.getElementById('owner_name').value = "";
        document.getElementById('phone').value = "";
        document.getElementById('whatsapp').value = "";
        document.getElementById('address').value = "";
        document.querySelectorAll('.area-item').forEach(i => i.checked = false);
        document.getElementById('area_udaipur').checked = false;
        document.getElementById('v1').innerText = "0";
        updateID();
        document.getElementById('draft_status').innerText = "EMPTY";
    }

    // --- ADMIN PANEL FUNCTIONS ---
    function switchTab(tab) {
        const content = document.getElementById('admin_content');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        if (tab === 'logs') {
            content.innerHTML = "<h4>Live Feed</h4><div id='log_list'>Loading...</div>";
            renderLogs();
        } else if (tab === 'analytics') {
            content.innerHTML = "<h4>Demand Analytics</h4><p>Tracking high-demand areas in Udaipur...</p>";
        } else if (tab === 'staff') {
            content.innerHTML = "<h4>Staff Efficiency</h4><p>Monitoring submission rates per profile...</p>";
        } else if (tab === 'export') {
            content.innerHTML = "<h4>Download Center</h4><button class='btn' style='background:var(--blue)' onclick='alert(\"Exporting...\")'>Export Master DB (XLSX)</button>";
        }
    }

    function renderLogs() {
        const tx = db.transaction("records", "readonly");
        tx.objectStore("records").getAll().onsuccess = e => {
            const logs = e.target.result.reverse();
            document.getElementById('log_list').innerHTML = logs.map(l => `
                <div style="padding:10px; border-bottom:1px solid #eee; font-size:12px;">
                    <b>${l.firm}</b> [${l.id}]<br>
                    Staff: ${l.staff} | Area: ${l.status} | Time: ${new Date(l.timestamp).toLocaleTimeString()}
                </div>
            `).join('');
        };
    }

    // --- BASE HELPERS ---
    function initMap() { 
        map = L.map('map').setView([24.5854, 73.7125], 13); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); 
    }
    function updateID() { document.getElementById('sup_id').innerText = "NS-" + Date.now().toString().slice(-6); }
    function autoWA(p, w) { document.getElementById(w).value = document.getElementById(p).value; }
    function toggleWholeUdaipur() {
        const check = document.getElementById('area_udaipur').checked;
        document.querySelectorAll('.area-item').forEach(i => i.checked = check);
    }
    function getGPS() { 
        navigator.geolocation.getCurrentPosition(async p => { 
            const lat = p.coords.latitude, lon = p.coords.longitude;
            document.getElementById('gps_val').value = `${lat},${lon}`;
            document.getElementById('count_gps').innerText = "Yes";
            if(marker) map.removeLayer(marker);
            marker = L.marker([lat, lon]).addTo(map);
            map.setView([lat, lon], 15);
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
            const d = await res.json();
            document.getElementById('address').value = d.display_name;
        }); 
    }
    function adj(id, val) {
        let el = document.getElementById(id);
        let curr = parseInt(el.innerText);
        if (curr + val >= 0) el.innerText = curr + val;
    }
    function updateCount() {
        const tx = db.transaction("records", "readonly");
        tx.objectStore("records").getAll().onsuccess = e => {
            document.getElementById('count_all').innerText = e.target.result.length;
        };
    }
</script>
</body>
</html>

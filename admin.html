<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirmansutra HQ | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; border-radius: 15px; border: 1px solid #e5e7eb; }
        .stat-card { border-top: 4px solid #FF5A00; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <nav class="bg-[#0B1B33] text-white p-6 flex justify-between items-center shadow-xl">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[#FF5A00] rounded flex items-center justify-center font-black">N</div>
            <h1 class="text-xl font-black uppercase italic tracking-tighter">Admin <span class="text-[#FF5A00]">Dashboard</span></h1>
        </div>
        <button onclick="logout()" class="text-[10px] font-bold bg-white/10 px-4 py-2 rounded uppercase tracking-widest hover:bg-red-500 transition-all">Sign Out</button>
    </nav>

    <main class="max-w-7xl mx-auto p-8 grid grid-cols-1 lg:grid-cols-4 gap-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm stat-card">
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Live Suppliers</p>
            <h2 id="total-count" class="text-4xl font-black text-[#0B1B33]">0</h2>
        </div>
        <div class="lg:col-span-3 bg-white p-3 rounded-3xl shadow-2xl border border-gray-100">
            <div id="map"></div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
            authDomain: "infradepo.firebaseapp.com",
            projectId: "infradepo",
            storageBucket: "infradepo.firebasestorage.app",
            messagingSenderId: "733942710671",
            appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // RBAC Check
        auth.onAuthStateChanged(user => { if(!user) window.location.href="index.html"; });

        // Init Map
        const map = L.map('map').setView([24.5854, 73.7125], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Load Field Data
        db.collection("field_data").onSnapshot(snap => {
            document.getElementById('total-count').innerText = snap.size;
            snap.forEach(doc => {
                const d = doc.data();
                if(d.latitude && d.longitude) {
                    L.marker([d.latitude, d.longitude])
                     .addTo(map)
                     .bindPopup(`<b style="color:#FF5A00">${d.firmName}</b><br>Owner: ${d.ownerName}<br>Material: ${d.material}`);
                }
            });
        });

        function logout() { auth.signOut().then(() => window.location.href="index.html"); }
    </script>
</body>
</html>

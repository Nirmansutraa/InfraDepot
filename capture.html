<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>InfraDepot Capture</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f9;
}

header{
background:#0b1b33;
color:white;
padding:16px;
font-size:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
max-width:600px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

input, select{

width:100%;
padding:12px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #ddd;
font-size:14px;

}

button{

padding:12px 20px;
border:none;
background:#0b1b33;
color:white;
border-radius:6px;
cursor:pointer;

}

.logout{

background:#d9534f;

}

.status{

margin-top:10px;
font-size:13px;
color:#666;

}

</style>

</head>

<body>

<header>

<div>InfraDepot – Supplier Capture</div>

<button class="logout" onclick="logout()">Logout</button>

</header>

<div class="container">

<div class="card">

<h3>Supplier Information</h3>

<input id="firm" placeholder="Firm Name">

<input id="owner" placeholder="Owner Name">

<input id="phone" placeholder="Phone Number">

<input id="whatsapp" placeholder="WhatsApp Number">

<input id="address" placeholder="Business Address">

<select id="material">

<option value="">Material Category</option>
<option>Sand</option>
<option>Aggregates</option>
<option>Cement</option>
<option>Steel</option>

</select>

<button onclick="saveSupplier()">Save Supplier</button>

<div class="status" id="status"></div>

</div>

</div>

<script>

const session = localStorage.getItem("infraDepotUser");

if(!session){

window.location.href="login.html";

}

function logout(){

localStorage.removeItem("infraDepotUser");

window.location.href="login.html";

}

function saveSupplier(){

const firm=document.getElementById("firm").value;

const owner=document.getElementById("owner").value;

const phone=document.getElementById("phone").value;

const whatsapp=document.getElementById("whatsapp").value;

const address=document.getElementById("address").value;

const material=document.getElementById("material").value;

if(firm=="" || owner==""){

document.getElementById("status").innerText="Enter required fields";

return;

}

const supplier={

firm,
owner,
phone,
whatsapp,
address,
material,
capturedBy:session,
timestamp:new Date().toISOString()

};

console.log("Supplier Captured:",supplier);

document.getElementById("status").innerText="Supplier saved (local test mode)";

}

</script>

</body>

</html>

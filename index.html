<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InfraDepot | Intelligence</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/icons/icon-512.png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --accent: #2dd4bf;
            --text: #ffffff;
            --gray: #9ca3af;
        }

        body { 
            margin:0; background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        #auth_layer, #app_layer { display:none; min-height:100vh; padding: 20px; box-sizing: border-box; }

        /* Professional UI Cards */
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .section-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat small { color: var(--gray); font-size: 10px; display: block; margin-bottom: 5px; }
        .stat div { font-size: 24px; font-weight: bold; color: var(--accent); }

        /* Input Styling */
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .btn-main {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-green { background: var(--accent); color: #000; }
        .btn-circle {
            width: 40px; height: 40px; border-radius: 50%;
            border: none; background: rgba(255,255,255,0.1); color: #fff;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        /* Loading Screen */
        .loading-screen { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; background: #000; 
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(45,212,191,0.1);
            border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Map styling */
        #admin_map { width: 100%; height: 100%; border-radius: 12px; }
        .leaflet-container { background: #111 !important; border-radius: 12px; }
    </style>
</head>
<body>

    <div id="loader" class="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top:20px; font-size:10px; letter-spacing:2px; opacity:0.5;">INFRA DEPOT SECURE BOOT...</p>
    </div>

    <div id="auth_layer"></div>
    <div id="app_layer"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/admin.js"></script>
    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/map.js"></script>
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/app.js"></script>

</body>
</html>

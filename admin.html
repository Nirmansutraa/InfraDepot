<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfraDepot | Intelligence Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #admin_map { height: 500px; width: 100%; border-radius: 1.5rem; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">

    <div id="auth-status" class="bg-emerald-500 text-slate-900 text-center py-2 text-[10px] font-black uppercase tracking-[0.2em]">
        System Initializing...
    </div>

    <div class="flex">
        <aside class="w-64 bg-slate-950 h-screen p-6 border-r border-slate-800 hidden md:block">
            <h2 class="text-emerald-400 font-black text-xl mb-10">🏗️ INFRADEPOT</h2>
            <nav class="space-y-4">
                <div class="text-emerald-500 bg-slate-900 p-4 rounded-xl font-bold">📊 Dashboard</div>
                <div class="text-slate-500 p-4 hover:text-slate-300 cursor-pointer">👥 Staff Management</div>
            </nav>
        </aside>

        <main class="flex-1 p-10">
            <h1 class="text-3xl font-black mb-8 tracking-tighter">Market Intelligence: Udaipur</h1>
            
            <div id="content-area" class="space-y-6">
                <div class="bg-slate-800 p-8 rounded-[2rem] border border-slate-700">
                    <div id="admin_map"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
            authDomain: "infradepo.firebaseapp.com",
            projectId: "infradepo",
            storageBucket: "infradepo.firebasestorage.app",
            messagingSenderId: "733942710671",
            appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        console.log("Admin Engine: Logic Loaded"); // This SHOULD show in console now

        onAuthStateChanged(auth, async (user) => {
            const statusBox = document.getElementById('auth-status');
            
            if (user) {
                console.log("Checking UID:", user.uid);
                const userDoc = await getDoc(doc(db, "users", user.uid));
                
                if (userDoc.exists() && userDoc.data().role === 'admin') {
                    statusBox.innerText = "ACCESS GRANTED: WELCOME " + (userDoc.data().name || "VIJAY");
                    statusBox.className = "bg-emerald-500 text-slate-900 text-center py-2 text-[10px] font-black uppercase";
                    loadMap();
                } else {
                    statusBox.innerText = "ACCESS DENIED: NOT AN ADMIN";
                    statusBox.className = "bg-rose-600 text-white text-center py-2 text-[10px] font-black uppercase";
                    setTimeout(() => window.location.href = "login.html", 3000);
                }
            } else {
                statusBox.innerText = "NO SESSION: REDIRECTING...";
                window.location.href = "login.html";
            }
        });

        function loadMap() {
            const map = L.map('admin_map').setView([24.5854, 73.7125], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>InfraDepot Login</title>

<style>

body{
margin:0;
padding:0;
background:#f1f3f6;
font-family:Arial, Helvetica, sans-serif;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:12px;
width:360px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
text-align:center;
}

h1{
margin:0;
font-size:28px;
color:#0b1b33;
}

.subtitle{
font-size:14px;
color:#6b7280;
margin-bottom:30px;
}

input{
width:100%;
padding:14px;
margin-bottom:16px;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
background:#0b1b33;
color:white;
border-radius:8px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#162a4d;
}

.status{
margin-top:15px;
font-size:13px;
color:#888;
}

</style>

</head>

<body>

<div class="card">

<h1>InfraDepot</h1>
<div class="subtitle">Enterprise Identity Management</div>

<input id="staffID" placeholder="Staff ID">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">LOGIN TO SYSTEM</button>

<div class="status" id="status"></div>

</div>


<script>

function login(){

const id=document.getElementById("staffID").value;
const pass=document.getElementById("password").value;

if(id=="" || pass==""){

document.getElementById("status").innerText="Enter credentials";

return;

}

/*
Demo credentials
Replace later with Firebase users
*/

if(id==="admin" && pass==="1234"){

localStorage.setItem("infraDepotUser",id);

window.location.href="capture.html";

}else{

document.getElementById("status").innerText="Invalid credentials";

}

}

</script>

</body>
</html>

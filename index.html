<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirmansutra | India's Construction Ecosystem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; color: #1a202c; scroll-behavior: smooth; }
        .btn-orange { background-color: #FF5A00; color: white; transition: 0.3s; }
        .btn-orange:hover { background-color: #E65100; transform: translateY(-2px); }
        .hero-bg { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
            url('https://images.unsplash.com/photo-1504307651254-35680f356dfd?q=80&w=2070'); 
            background-size: cover; 
            background-position: center;
        }
        #auth-overlay { position: fixed; inset: 0; background: white; z-index: 1000; display: none; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="auth-overlay">
        <div class="w-12 h-12 border-4 border-gray-200 border-t-[#FF5A00] rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-bold text-gray-400 uppercase tracking-widest">Verifying Credentials...</p>
    </div>

    <nav class="fixed top-0 w-full z-50 bg-white shadow-sm border-b h-20 flex justify-between items-center px-8">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-[#FF5A00] rounded flex items-center justify-center font-black text-white">N</div>
            <span class="text-2xl font-black text-[#0B1B33] tracking-tighter">NIRMANSUTRA</span>
        </div>
        <div class="flex gap-6 items-center">
            <a href="#" class="hidden md:block text-sm font-bold text-gray-500 hover:text-[#FF5A00]">About</a>
            <button onclick="login()" class="btn-orange px-8 py-2.5 rounded font-bold uppercase text-[10px] tracking-widest shadow-lg shadow-orange-500/20">Partner Login</button>
        </div>
    </nav>

    <section class="hero-bg min-h-screen flex items-center px-8">
        <div class="max-w-4xl text-white space-y-8">
            <div class="inline-block px-4 py-1 rounded-full bg-[#FF5A00] text-[10px] font-black uppercase tracking-widest">Udaipur Infrastructure Hub</div>
            <h1 class="text-6xl md:text-8xl font-900 tracking-tighter leading-[0.85] italic">
                DIGITIZING <br>THE <span class="text-[#FF5A00]">SUPPLY CHAIN.</span>
            </h1>
            <p class="text-xl font-light max-w-xl text-gray-300">
                Nirmansutra is the tech-enabled procurement platform for modern infrastructure projects in Rajasthan.
            </p>
            <div class="flex gap-4">
                <button onclick="login()" class="btn-orange px-12 py-5 rounded font-black uppercase text-sm tracking-widest active:scale-95 transition-all">
                    Access Portal
                </button>
            </div>
        </div>
    </section>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
            authDomain: "infradepo.firebaseapp.com",
            projectId: "infradepo",
            storageBucket: "infradepo.firebasestorage.app",
            messagingSenderId: "733942710671",
            appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => alert("Login Error: " + err.message));
        }

        // 🧠 THE MASTER RBAC ROUTER
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                document.getElementById('auth-overlay').style.display = 'flex';
                
                try {
                    // Check by UID
                    const doc = await db.collection("users").doc(user.uid).get();
                    
                    if (doc.exists) {
                        const data = doc.data();
                        routeByRole(data.role);
                    } else {
                        // Fallback: Check by email whitelist
                        const q = await db.collection("users").where("email", "==", user.email).get();
                        if (!q.empty) {
                            routeByRole(q.docs[0].data().role);
                        } else {
                            alert("Access Denied: " + user.email + " is not whitelisted in Nirmansutra HQ.");
                            auth.signOut();
                            location.reload();
                        }
                    }
                } catch (error) {
                    console.error("Auth Error:", error);
                    document.getElementById('auth-overlay').style.display = 'none';
                }
            }
        });

        function routeByRole(role) {
            // WORLD CLASS RBAC ROUTING
            if (role === 'super_admin' || role === 'admin') {
                window.location.href = "admin.html";
            } else {
                // All staff now goes to the advanced survey page
                window.location.href = "survey.html";
            }
        }
    </script>
</body>
</html>

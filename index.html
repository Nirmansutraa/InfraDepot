<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirmansutra | Infrastructure Supply Chain</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; color: #1a202c; scroll-behavior: smooth; }
        .btn-orange { background-color: #FF5A00; color: white; transition: 0.3s; }
        .hero-bg { 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
            url('https://images.unsplash.com/photo-1541888946425-d81bb19240f5?q=80&w=2070'); 
            background-size: cover; background-position: center;
        }
        #auth-overlay { position: fixed; inset: 0; background: white; z-index: 1000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .modal { background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="auth-overlay">
        <div class="w-12 h-12 border-4 border-gray-200 border-t-[#FF5A00] rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Securing Session...</p>
    </div>

    <nav class="fixed top-0 w-full z-50 bg-white shadow-sm border-b h-20 flex justify-between items-center px-8">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-[#FF5A00] rounded flex items-center justify-center font-black text-white text-xl">N</div>
            <span class="text-2xl font-black text-[#0B1B33] tracking-tighter">NIRMANSUTRA</span>
        </div>
        <div class="flex gap-4">
            <button onclick="login()" class="text-xs font-bold uppercase text-gray-500 hover:text-[#FF5A00] transition-all">Login</button>
            <button onclick="toggleRequestModal()" class="btn-orange px-6 py-2.5 rounded font-bold uppercase text-[10px] tracking-widest shadow-lg shadow-orange-500/20">Request Access</button>
        </div>
    </nav>

    <section class="hero-bg min-h-screen flex items-center px-8">
        <div class="max-w-4xl text-white space-y-8">
            <div class="inline-block px-4 py-1 rounded bg-[#FF5A00] text-[10px] font-black uppercase tracking-widest">Udaipur, Rajasthan</div>
            <h1 class="text-6xl md:text-8xl font-900 tracking-tighter leading-none italic uppercase">
                Building <br>Future <span class="text-[#FF5A00]">Nodes.</span>
            </h1>
            <p class="text-xl font-light max-w-xl text-gray-300">The unified technology layer for construction material intelligence and real-time supplier mapping.</p>
            <div class="flex gap-4">
                <button onclick="login()" class="btn-orange px-12 py-5 rounded font-black uppercase text-sm tracking-widest active:scale-95 transition-all shadow-2xl">
                    Enter Terminal
                </button>
            </div>
        </div>
    </section>

    <div id="request-modal" class="fixed inset-0 modal z-[2000] hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md p-10 rounded-[2.5rem] relative shadow-2xl">
            <button onclick="toggleRequestModal()" class="absolute top-8 right-8 text-gray-400 hover:text-black font-bold">✕</button>
            <h3 class="text-2xl font-black text-slate-800 mb-2 italic">Onboarding Request</h3>
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-8">Submit your details for Vijay's approval</p>
            
            <div class="space-y-4">
                <input type="text" id="req-name" placeholder="Full Name" class="w-full p-4 bg-gray-50 border rounded-xl outline-none focus:border-[#FF5A00]">
                <input type="email" id="req-email" placeholder="Gmail Address" class="w-full p-4 bg-gray-50 border rounded-xl outline-none focus:border-[#FF5A00]">
                <button onclick="submitRequest()" class="w-full btn-orange py-4 rounded-xl font-black text-xs uppercase tracking-widest shadow-xl">Send Request</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDi2TQAvaqnz0D3eK6KZLYYhxsHUBG10A8",
            authDomain: "infradepo.firebaseapp.com",
            projectId: "infradepo",
            storageBucket: "infradepo.firebasestorage.app",
            messagingSenderId: "733942710671",
            appId: "1:733942710671:web:1a2fdd540032ea73b2cbfa"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function login() {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        }

        function toggleRequestModal() {
            document.getElementById('request-modal').classList.toggle('hidden');
        }

        // 🧠 THE RBAC ROUTER
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                document.getElementById('auth-overlay').style.display = 'flex';
                const doc = await db.collection("users").doc(user.uid).get();
                
                if (doc.exists) {
                    const role = doc.data().role;
                    if(role === 'admin' || role === 'super_admin') window.location.href = "admin.html";
                    else if(role === 'field_staff') window.location.href = "survey.html";
                    else {
                        alert("Access Pending: Vijay has not activated your account.");
                        auth.signOut();
                        location.reload();
                    }
                } else {
                    // AUTO-WHITELIST: Creates a pending entry if user logs in for first time
                    await db.collection("users").doc(user.uid).set({
                        email: user.email,
                        role: 'pending',
                        status: 'inactive',
                        requestedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    alert("Account Created! Please ask Vijay to activate your email: " + user.email);
                    auth.signOut();
                    location.reload();
                }
            }
        });

        async function submitRequest() {
            const name = document.getElementById('req-name').value;
            const email = document.getElementById('req-email').value;
            if(!name || !email) return alert("All fields are required.");

            await db.collection("access_requests").add({
                name: name,
                email: email,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                status: 'new'
            });
            alert("Request Sent! HQ will review your credentials.");
            toggleRequestModal();
        }
    </script>
</body>
</html>

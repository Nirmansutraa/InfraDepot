<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InfraDepot | Intelligence</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/icons/icon-512.png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg: #f3f4f6;
            --card: #ffffff;
            --accent: #10b981;
            --text: #111827;
            --gray: #6b7280;
        }

        body { 
            margin:0; background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* THE FIX: Ensure layers don't block each other */
        #auth_layer, #app_layer { 
            display:none; 
            min-height:100vh; 
            position: relative;
            z-index: 1;
        }

        /* If a layer is hidden, it should not catch clicks */
        div:not([style*="display: block"]) {
            pointer-events: none;
        }
        
        div[style*="display: block"] {
            pointer-events: auto !important;
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .section-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #f59e0b;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 10px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: #fff;
            border: 1px solid #ddd;
            color: #000;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            pointer-events: auto !important; /* Forces inputs to be clickable */
        }

        input:focus {
            border-color: var(--accent);
            outline: none;
        }

        .btn-main {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            display: block;
        }

        .loading-screen { 
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; background: #fff; 
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(16,185,129,0.1);
            border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #survey_map { width: 100%; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div id="loader" class="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top:20px; font-size:10px; letter-spacing:2px; color:#10b981;">INFRA DEPOT SECURE BOOT...</p>
    </div>

    <div id="auth_layer"></div>
    <div id="app_layer"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/map.js"></script>
    <script type="module" src="js/storage.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/admin.js"></script>
    <script type="module" src="js/ui.js"></script>
    <script type="module" src="js/app.js"></script>

</body>
</html>

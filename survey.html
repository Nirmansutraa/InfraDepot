<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>InfraDepot Survey</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { font-family: Arial; background:#f2f4f7; margin:0; }

.header {
  background:#fff;
  padding:12px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #ddd;
  font-size:14px;
}

.container { padding:10px; }

.card {
  background:#fff;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
}

.title {
  font-size:12px;
  color:#ff7a00;
  font-weight:bold;
  margin-bottom:8px;
}

label {
  font-size:11px;
  color:#777;
}

input {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

.row {
  display:flex;
  gap:8px;
}

.dark-box {
  background:#0f1b2d;
  color:#00ffcc;
  text-align:center;
  padding:15px;
  border-radius:8px;
}

.map {
  height:150px;
  border-radius:8px;
  margin-bottom:10px;
}

.btn {
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  margin-top:6px;
}

.btn-dark { background:#0f1b2d; color:white; }
.btn-green { background:#2ecc71; color:white; }

.material {
  display:flex;
  justify-content:space-between;
  background:#0f1b2d;
  color:white;
  padding:12px;
  border-radius:8px;
  margin-bottom:8px;
}

.counter-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.counter {
  background:#f4f6f9;
  padding:10px;
  border-radius:8px;
}

.counter-inner {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.counter button {
  width:30px;
  height:30px;
  background:#0f1b2d;
  color:white;
  border:none;
  border-radius:6px;
}

.footer-btns {
  display:flex;
  gap:10px;
}
</style>

</head>

<body>

<div class="header">
  <div>Field Staff: <b>FS3396954</b></div>
  <div style="color:red;">LOGOUT</div>
</div>

<div class="container">

<!-- 1 TRACKING -->
<div class="card">
  <div class="title">1. TRACKING ID</div>
  <div id="trackingIdBox" class="dark-box">ID---</div>
</div>

<!-- 2 ENTITY -->
<div class="card">
  <div class="title">2. ENTITY & CONTACTS</div>

  <label>FIRM NAME</label>
  <input id="firmName" placeholder="Enter Firm Name">

  <label>OWNER DETAILS</label>
  <input id="ownerName" placeholder="Owner Full Name">

  <div class="row">
    <input id="ownerPhone" placeholder="Phone">
    <input id="ownerWhatsapp" placeholder="WhatsApp">
  </div>

  <label>MANAGER CONTACT</label>
  <input id="managerName" placeholder="Manager Name">

  <div class="row">
    <input id="managerPhone" placeholder="Phone">
    <input id="managerWhatsapp" placeholder="WhatsApp">
  </div>

  <label>BUSINESS ADDRESS</label>
  <input id="address" placeholder="Waiting for GPS...">
</div>

<!-- 3 GPS -->
<div class="card">
  <div class="title">3. GPS & VERIFICATION</div>

  <div id="map" class="map"></div>

  <button class="btn btn-dark" onclick="captureGPS()">📍 CAPTURE GPS & ADDRESS</button>

  <input id="coordinates" placeholder="Coordinates">

  <label>VERIFICATION PHOTOS</label>
  <input type="file" accept="image/*" capture="environment" onchange="handlePhoto(event)">
  <div id="photos"></div>
</div>

<!-- 4 MATERIAL -->
<div class="card">
  <div class="title">4. MATERIALS INTELLIGENCE</div>

  <div id="materialsContainer"></div>
</div>

<!-- 5 FLEET -->
<div class="card">
  <div class="title">5. TRANSPORTATION FLEET</div>

  <div id="fleetContainer" class="counter-grid"></div>
</div>

<!-- 6 ACTION -->
<div class="card">
  <div class="title">6. DATA ACTIONS</div>

  <div class="footer-btns">
    <button class="btn">💾 SAVE LOCAL</button>
    <button class="btn btn-green">📤 SUBMIT SYNC</button>
  </div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">
import "./js/firebase-config.js";
import "./data/materials.js";
import "./js/pricing-engine.js";
import "./js/materials-engine.js";
import "./js/core-engine.js";
</script>

</body>
</html>
